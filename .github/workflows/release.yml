name: Release

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Leave the GitHub release as a draft after all assets upload"
        required: true
        type: boolean
        default: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  metadata:
    name: Release metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate version
        id: version
        run: |
          set -euo pipefail

          version="$(jq -r '.version' src-tauri/tauri.conf.json)"
          package_version="$(jq -r '.version' package.json)"
          cargo_version="$(sed -n 's/^version = "\(.*\)"/\1/p' src-tauri/Cargo.toml | head -n1)"

          if [ "$version" != "$package_version" ] || [ "$version" != "$cargo_version" ]; then
            echo "::error::Version mismatch: tauri=$version package=$package_version cargo=$cargo_version"
            exit 1
          fi

          if [[ "$version" != *"-alpha"* ]]; then
            echo "::error::Alpha-only release policy is active; version must include -alpha. Got: $version"
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

  windows:
    name: Build Windows portable artifacts
    needs: metadata
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - name: Enable long paths
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          git config --system core.longpaths true

      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"
          key: release-windows-x64

      - name: Reset stale sherpa prebuilt cache
        shell: pwsh
        run: |
          $paths = @(
            "src-tauri\target\sherpa-onnx-prebuilt",
            "src-tauri\target\debug\build\sherpa-onnx-*",
            "src-tauri\target\debug\.fingerprint\sherpa-onnx-*",
            "src-tauri\target\release\build\sherpa-onnx-*",
            "src-tauri\target\release\.fingerprint\sherpa-onnx-*"
          )
          foreach ($path in $paths) {
            Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
          }

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        shell: pwsh
        run: |
          bun install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) {
            bun pm cache rm
            bun install --frozen-lockfile
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Tauri release binary
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ($env:TAURI_SIGNING_PRIVATE_KEY) {
            $env:TAURI_SIGNING_PRIVATE_KEY = $env:TAURI_SIGNING_PRIVATE_KEY.TrimStart([char]0xFEFF)
          }
          if ($env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD) {
            $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD = $env:TAURI_SIGNING_PRIVATE_KEY_PASSWORD.TrimStart([char]0xFEFF).TrimEnd("`r", "`n")
          }
          tools\windows\tauri-build.ps1 -Bundles nsis -Config tools\tauri-ci-artifacts.conf.json

      - name: Collect portable Windows artifacts
        shell: pwsh
        run: tools\windows\tauri-portable.ps1 -SkipBuild

      - name: Upload Windows artifacts to workflow run
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: winstt-windows-x64
          if-no-files-found: error
          path: |
            dist/WinSTT.exe
            dist/WinSTT-portable.zip
            src-tauri/target/release/bundle/nsis/*.sig

  linux:
    name: Build Linux bundle artifacts
    needs: metadata
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            fuse \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            librsvg2-dev \
            libssl-dev \
            libvulkan-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"
          key: release-linux-x64

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        run: |
          bun install --frozen-lockfile || {
            bun pm cache rm
            bun install --frozen-lockfile
          }

      - name: Build Linux artifacts
        env:
          TAURI_BUNDLE_CONFIG: none
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            TAURI_SIGNING_PRIVATE_KEY="${TAURI_SIGNING_PRIVATE_KEY#$'\xef\xbb\xbf'}"
            export TAURI_SIGNING_PRIVATE_KEY
          fi
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD#$'\xef\xbb\xbf'}"
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | tr -d '\r\n')"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          bash tools/linux/tauri-bundles.sh

      - name: Upload Linux artifacts to workflow run
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: winstt-linux-x64
          if-no-files-found: error
          path: dist/linux/*

  macos:
    name: Build macOS bundle artifacts (${{ matrix.arch }})
    needs: metadata
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            runner: macos-15
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"
          key: release-macos-${{ matrix.target }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        run: |
          bun install --frozen-lockfile || {
            bun pm cache rm
            bun install --frozen-lockfile
          }

      - name: Build macOS artifacts
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            TAURI_SIGNING_PRIVATE_KEY="${TAURI_SIGNING_PRIVATE_KEY#$'\xef\xbb\xbf'}"
            export TAURI_SIGNING_PRIVATE_KEY
          fi
          if [ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]; then
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD="${TAURI_SIGNING_PRIVATE_KEY_PASSWORD#$'\xef\xbb\xbf'}"
            TAURI_SIGNING_PRIVATE_KEY_PASSWORD="$(printf '%s' "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" | tr -d '\r\n')"
            export TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          fi
          bash tools/macos/tauri-bundles.sh "${{ matrix.target }}" "${{ matrix.arch }}"

      - name: Upload macOS artifacts to workflow run
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: winstt-macos-${{ matrix.arch }}
          if-no-files-found: error
          path: dist/macos/${{ matrix.arch }}/*

  publish:
    name: Upload assets to GitHub release
    needs: [metadata, windows, linux, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_DRAFT: ${{ inputs.draft }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          $draft = [System.Convert]::ToBoolean($env:RELEASE_DRAFT)
          $prerelease = $true
          tools/release/upload-github-assets.ps1 `
            -AssetsRoot release-assets `
            -Version $env:VERSION `
            -Target $env:GITHUB_SHA `
            -Prerelease:$prerelease `
            -Draft:$draft

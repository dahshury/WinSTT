name: Mutation Testing

on:
  schedule:
    # 06:00 UTC daily — informational run; we don't gate merges on it.
    - cron: "0 6 * * *"
  workflow_dispatch:

# Let runs accumulate so trends are visible across days; don't cancel an
# in-progress nightly because a manual dispatch fired.
concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  frontend-mutation:
    name: Frontend (Stryker)
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Surviving mutants are informational, not a gate. continue-on-error
      # keeps the artifact-upload step reachable even when Stryker exits
      # non-zero (e.g. mutation score below "break" threshold).
      - name: Run Stryker
        id: stryker
        working-directory: frontend
        continue-on-error: true
        run: bunx stryker run --concurrency 2

      - name: Upload Mutation Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: frontend/reports/mutation/
          if-no-files-found: warn
          retention-days: 30

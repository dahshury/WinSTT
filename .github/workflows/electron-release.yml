name: Electron Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

# Build CPU, DirectML and OpenVINO flavors as parallel jobs. All three
# publish to the same GitHub Release on this repo (`dahshury/WinSTT`,
# public). electron-builder appends each artifact under its distinct
# ``artifactName`` (set in electron-builder.{cpu,directml,openvino}.yml),
# so the release page ends up with three installers side by side.
# electron-updater treats them as separate update channels: a user
# installed via CPU gets only CPU updates, DirectML users get DirectML,
# OpenVINO users get OpenVINO.
#
# DirectML is the default Windows GPU build (replaces the legacy CUDA flavor —
# ~10x lighter and faster on our workload per the EP benchmark in device.py).
# OpenVINO is the Intel-optimised path for Intel ARC dGPUs and recent
# Iris Xe / Arc iGPUs — auto-picked ahead of DirectML on Intel silicon
# when the EP is registered (see device.py::_AUTO_PRIORITY).
# CUDA EP detection is preserved in src/recorder/infrastructure/device.py for
# the eventual Linux NVIDIA build, but no Windows CUDA installer is shipped.
#
# The TTS support pack also publishes here (under the version-independent
# `tts-pack-v1` tag), keyed to the URL the server reads in
# server/src/synthesizer/infrastructure/support_pack.py.
jobs:
  build:
    name: Build (${{ matrix.flavor }})
    runs-on: windows-latest
    strategy:
      # Run all flavors regardless of one failing — easier to debug than
      # bailing out half-way and re-running just the failing one needing
      # special tag manipulation.
      fail-fast: false
      matrix:
        flavor: [cpu, directml, openvino]
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINSTT_ENABLE_AUTO_UPDATES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      # UPX shrinks PyInstaller-bundled C extensions by 30–60 %. The spec
      # at ``server/packaging/stt-server.spec`` enables it by default when
      # the ``upx`` binary is on PATH and excludes CUDA + signed DLLs from
      # compression (UPX would corrupt them or trigger antivirus). Set
      # ``WINSTT_NO_UPX=1`` here to bypass.
      - name: Install UPX
        shell: pwsh
        run: choco install upx -y --no-progress

      # The PyInstaller build step produces
      # <repo>/packaging/stt-server-dist/${flavor}/ which
      # packaging/electron-builder.${flavor}.yml reads via
      # ``extraResources: from: ../packaging/stt-server-dist/${flavor}/``
      # (resolved against projectDir = frontend, so ``..`` is the repo root).
      - name: Build STT server (${{ matrix.flavor }})
        shell: pwsh
        run: pwsh server/packaging/build.ps1 -Flavor ${{ matrix.flavor }}

      # On-demand TTS support pack (kokoro-onnx + espeak-ng + phonemizer
      # tree — never frozen into the exe). Built once against the same
      # cp312 venv the exe was frozen with, then published to the stable
      # ``tts-pack-v1`` release. The server resolves a pinned URL there
      # (see server/src/synthesizer/infrastructure/support_pack.py), so
      # the pack is decoupled from the per-app-version release — same
      # pattern as the pinned Kokoro model URLs. CPU job only: the pack
      # is flavor-agnostic (python/arch-specific), so building it in both
      # matrix legs would just race to upload an identical artifact.
      - name: Build And Publish TTS support pack
        if: matrix.flavor == 'cpu'
        shell: pwsh
        working-directory: server
        # `gh` defaults to the workflow's own repo (dahshury/WinSTT). No
        # `--repo` override needed since the support_pack.py URL points here
        # too. CPU job only: the pack is python/arch-specific, not flavor-
        # specific, so doing it in both matrix legs would race to upload an
        # identical artifact.
        run: |
          uv run python packaging/build_tts_pack.py --out packaging/dist-tts
          $tag = "tts-pack-v1"
          # Idempotent: create the pinned release once, then clobber the
          # asset on every release build so it tracks the dep closure.
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title "TTS support pack" --notes "On-demand TTS engine pack downloaded by WinSTT when the user enables Text-to-Speech. Rebuilt automatically; pinned URL is version-independent." --latest=false
          }
          $assets = Get-ChildItem packaging/dist-tts -Include "winstt-tts-pack-*.zip","winstt-tts-pack-*.zip.sha256" -Recurse | ForEach-Object { $_.FullName }
          gh release upload $tag $assets --clobber

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Install root devDeps (electron-builder). The build script lives at
      # the repo root now (see root package.json) and delegates the renderer/
      # main prep into frontend/ via ``bun --cwd frontend run …``.
      - name: Install Root Dependencies
        run: bun install --frozen-lockfile

      - name: Build And Publish Electron Release (${{ matrix.flavor }})
        run: bun run electron:build:publish:${{ matrix.flavor }}

      # Parallel offline-verifiable trust layer alongside the Authenticode
      # signature that electron-updater already validates. Power users can
      # download <artifact>.minisig and verify with the pubkey at
      # docs/winstt.pub on any platform. See docs/RELEASE_SIGNING.md and
      # docs/content/docs/verify-releases.mdx.
      #
      # The keypair is generated locally by the maintainer (never in CI);
      # the secret key is supplied via the MINISIGN_SECRET_KEY repo secret
      # and the password via MINISIGN_PASSWORD. If MINISIGN_SECRET_KEY is
      # unset (e.g. first release before secrets are configured), this step
      # short-circuits with a warning so the release itself still publishes.
      - name: Install minisign
        if: ${{ secrets.MINISIGN_SECRET_KEY != '' }}
        shell: pwsh
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
        run: |
          # Scoop is preinstalled on `windows-latest` runners.
          scoop install minisign
          minisign -v

      - name: Sign artifacts with minisign (${{ matrix.flavor }})
        if: ${{ secrets.MINISIGN_SECRET_KEY != '' }}
        shell: pwsh
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"

          # Materialize the secret key from the repo secret into a temp file
          # (minisign -s wants a path). Cleaned up at job end with the runner.
          $keyPath = Join-Path $env:RUNNER_TEMP "winstt.key"
          $env:MINISIGN_SECRET_KEY | Out-File -FilePath $keyPath -Encoding ascii -NoNewline

          # Tag name = the ref this workflow ran on (e.g. refs/tags/v0.4.0).
          $tag = $env:GITHUB_REF -replace '^refs/tags/', ''

          # electron-builder writes installers to <repo>/dist/. Sign the
          # portable .exe artifacts — and any future .dmg/.AppImage if the
          # matrix grows — then upload each .minisig to the release.
          $artifacts = Get-ChildItem -Path dist -File -Include "*.exe","*.dmg","*.AppImage","*.zip" -Recurse
          if ($artifacts.Count -eq 0) {
            Write-Error "No release artifacts found in dist/ — nothing to sign."
            exit 1
          }

          foreach ($artifact in $artifacts) {
            Write-Host "Signing $($artifact.FullName)"
            # `-t` embeds a trusted comment with the artifact filename so
            # `minisign -V` prints something meaningful to the verifier.
            $trusted = "WinSTT release $tag — $($artifact.Name)"
            $env:MINISIGN_PASSWORD | minisign -S -s $keyPath -m $artifact.FullName -t $trusted
            if ($LASTEXITCODE -ne 0) {
              Write-Error "minisign failed for $($artifact.FullName)"
              exit $LASTEXITCODE
            }
          }

          # Upload the .minisig sidecars to the same GitHub Release that
          # electron-builder just published. `--clobber` keeps the step
          # idempotent if a job is re-run.
          $sigs = Get-ChildItem -Path dist -File -Filter "*.minisig" -Recurse | ForEach-Object { $_.FullName }
          gh release upload $tag $sigs --clobber

      - name: Skip minisign (secret unset)
        if: ${{ secrets.MINISIGN_SECRET_KEY == '' }}
        run: |
          echo "::warning::MINISIGN_SECRET_KEY repo secret is not configured — skipping minisign signing. See docs/RELEASE_SIGNING.md."

  # ────────────────────────────────────────────────────────────────────
  # macOS build job — separate from the Windows matrix because the
  # runner type differs and only the CPU flavor is shipped on macOS:
  # DirectML is Windows-only, and onnxruntime-openvino on macOS targets
  # Intel Mac iGPUs which are increasingly rare. CoreML EP is baked
  # into the stock `onnxruntime` package the CPU flavor pulls in (see
  # server/src/recorder/infrastructure/device.py::_AUTO_PRIORITY),
  # so the "CPU" build on macOS automatically uses CoreML when
  # available.
  #
  # Apple Intelligence CLI: tools/apple-intelligence-cli/build.sh
  # compiles the Swift bridge and writes
  # frontend/electron/resources/macos/winstt-apple-llm, which the mac
  # electron-builder.cpu.yml `extraResources` block copies to
  # <App>.app/Contents/Resources/macos/ for runtime spawn.
  #
  # Notarization: opt-in via the APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD
  # / APPLE_TEAM_ID secrets. When unset, electron-builder still ships
  # an ad-hoc-signed DMG; Gatekeeper will refuse on first launch until
  # the user right-click → Open. See docs/RELEASE_SIGNING.md for the
  # full setup walkthrough.
  build-macos:
    name: Build (macOS)
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINSTT_ENABLE_AUTO_UPDATES: "1"
      # Notarization secrets — present == notarize, absent == ad-hoc-sign.
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      # Build the Swift Apple Intelligence bridge. Outputs
      # frontend/electron/resources/macos/winstt-apple-llm.
      # No-ops on non-Darwin runners (we'd never hit this branch from
      # Linux/Windows, but defensive doesn't hurt — the script itself
      # exits 0 silently when uname != Darwin).
      - name: Build Apple Intelligence CLI
        run: bash tools/apple-intelligence-cli/build.sh

      # Build the stt-server.exe equivalent for macOS (a unix binary the
      # Electron app's extraResources picks up). The existing
      # build.ps1 PowerShell script is Windows-only; we shell into uv +
      # PyInstaller directly here for the macOS leg.
      - name: Sync server (CPU extra)
        working-directory: server
        run: uv sync --extra cpu --group dev

      - name: Build stt-server binary
        working-directory: server
        run: |
          uv run pyinstaller packaging/stt-server.spec --clean --noconfirm \
            --distpath dist --workpath dist/build
          mkdir -p ../packaging/stt-server-dist/cpu
          cp -R dist/stt-server/* ../packaging/stt-server-dist/cpu/

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Install Root Dependencies
        run: bun install --frozen-lockfile

      - name: Build And Publish macOS DMG + ZIP
        # Reuses the existing publish:cpu script — `electron-builder` picks
        # the macOS-specific block from the same yml on a macOS runner.
        run: bun run electron:build:publish:cpu

      # Mirror the Windows minisign signing step for the macOS DMG / ZIP.
      # Same secret material, same sidecar pattern — the verifier in
      # electron/lib/minisign-verify.ts is cross-platform.
      - name: Install minisign (macOS)
        if: ${{ secrets.MINISIGN_SECRET_KEY != '' }}
        run: brew install minisign

      - name: Sign artifacts with minisign (macOS)
        if: ${{ secrets.MINISIGN_SECRET_KEY != '' }}
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          keyPath="$RUNNER_TEMP/winstt.key"
          printf '%s' "$MINISIGN_SECRET_KEY" > "$keyPath"
          tag="${GITHUB_REF#refs/tags/}"
          shopt -s nullglob
          for artifact in dist/*.dmg dist/*.zip; do
            [ -f "$artifact" ] || continue
            echo "Signing $artifact"
            printf '%s' "$MINISIGN_PASSWORD" | minisign -S -s "$keyPath" \
              -m "$artifact" -t "WinSTT release $tag — $(basename "$artifact")"
          done
          sigs=(dist/*.minisig)
          if [ ${#sigs[@]} -gt 0 ]; then
            gh release upload "$tag" "${sigs[@]}" --clobber
          fi

      - name: Skip minisign (secret unset)
        if: ${{ secrets.MINISIGN_SECRET_KEY == '' }}
        run: echo "::warning::MINISIGN_SECRET_KEY repo secret not configured — skipping minisign on macOS build."

name: Electron Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: frontend
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      WINSTT_ENABLE_AUTO_UPDATES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Verify Bundled STT Server
        shell: powershell
        run: |
          if (!(Test-Path "stt-server-dist")) {
            Write-Error "Missing frontend/stt-server-dist. Build and commit/copy bundled STT server artifacts before tagging a release."
            exit 1
          }

      - name: Build And Publish Electron Release
        run: bun run electron:build:publish

name: Rust CI

# Real CI for the Rust + Tauri port. The renderer lives in src/ and the
# backend crate in src-tauri/ — the old ci.yml targeted the now-deleted
# reference frontend/ + server/ dirs, so the ~58k-LOC crate and its 62
# Rust test files never ran. This gates fmt + clippy + tests on the
# shipped code so a broken Rust commit can't merge green.
#
# Path-gated on src-tauri/** (the crate) + this workflow file so renderer-
# only PRs don't pay the (slow, link-dominated) cargo build.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
      - "tools/windows/**"
      - "tools/linux/**"
      - "tools/tauri-ci-artifacts.conf.json"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    paths:
      - "src-tauri/**"
      - "tools/windows/**"
      - "tools/linux/**"
      - "tools/tauri-ci-artifacts.conf.json"
      - ".github/workflows/rust-ci.yml"

# Cancel superseded runs on the same ref — a fresh push obsoletes the
# prior pipeline immediately.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # windows-latest mirrors the DirectML shipped target. The macOS/Linux CPU
  # targets are covered by the cross-platform matrix below.
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache the src-tauri target dir keyed on the crate. The crate's link
      # step dominates rebuild time, so a warm target is a large speedup.
      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Reset stale sherpa prebuilt cache
        shell: pwsh
        run: |
          $paths = @(
            "src-tauri\target\sherpa-onnx-prebuilt",
            "src-tauri\target\debug\build\sherpa-onnx-*",
            "src-tauri\target\debug\.fingerprint\sherpa-onnx-*",
            "src-tauri\target\release\build\sherpa-onnx-*",
            "src-tauri\target\release\.fingerprint\sherpa-onnx-*"
          )
          foreach ($path in $paths) {
            Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
          }

      # bun for any renderer setup tauri codegen leans on. We don't run the
      # frontend gate here (that's the renderer's own workflow); this just
      # makes `bun` available if a build invokes it via beforeBuildCommand.
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Add LLVM linker to PATH
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$llvm\lld-link.exe")) {
            throw "lld-link.exe not found at $llvm"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $llvm
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$llvm"

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        working-directory: src-tauri
        shell: pwsh
        run: |
          # The test exe runs from target/debug/deps/, but the native ort /
          # onnxruntime / sherpa-onnx DLLs land in target/debug/. Put that on
          # PATH so the test harness can load them (else STATUS_ENTRYPOINT_NOT_FOUND).
          $env:PATH = "$PWD\target\debug;$env:PATH"
          cargo test --locked

  # Optional packaged build of the shipped Windows artifacts. It surfaces a
  # broken release bundle without bricking PRs on hosted-runner hiccups.
  # Promote to a hard gate once it's reliably green.
  build:
    name: Windows artifacts (optional)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Reset stale sherpa prebuilt cache
        shell: pwsh
        run: |
          $paths = @(
            "src-tauri\target\sherpa-onnx-prebuilt",
            "src-tauri\target\debug\build\sherpa-onnx-*",
            "src-tauri\target\debug\.fingerprint\sherpa-onnx-*",
            "src-tauri\target\release\build\sherpa-onnx-*",
            "src-tauri\target\release\.fingerprint\sherpa-onnx-*"
          )
          foreach ($path in $paths) {
            Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
          }

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        shell: pwsh
        run: |
          bun install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) {
            bun pm cache rm
            bun install --frozen-lockfile
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Build the same single-file Windows exe the release workflow uploads.
      # Updater artifacts are disabled for CI so this does not need the
      # minisign private key.
      - name: Tauri Windows bundle
        shell: pwsh
        run: tools\windows\tauri-build.ps1 -Bundles nsis -Config tools\tauri-ci-artifacts.conf.json

      - name: Collect portable Windows artifacts
        shell: pwsh
        run: tools\windows\tauri-portable.ps1 -SkipBuild

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: winstt-windows-x64
          if-no-files-found: error
          path: |
            dist/WinSTT.exe
            dist/WinSTT-portable.zip

  linux-artifacts:
    name: Linux artifacts (AppImage / deb / rpm, optional)
    runs-on: ubuntu-22.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            fuse \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            librsvg2-dev \
            libssl-dev \
            libvulkan-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ci-linux-artifacts

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux artifacts
        run: bash tools/linux/tauri-bundles.sh

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: winstt-linux-x64
          if-no-files-found: error
          path: dist/linux/*

  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            librsvg2-dev \
            libssl-dev \
            libvulkan-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        run: |
          bun install --frozen-lockfile || {
            bun pm cache rm
            bun install --frozen-lockfile
          }

      - name: Build renderer
        run: bun run build

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --all-targets --locked

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Tauri build (no bundle)
        run: bun run tauri build --no-bundle

  # Release-readiness signal (SEC-5). Fails loudly if the updater is still wired
  # with the placeholder signing key so a broken auto-update can't silently ship.
  # continue-on-error → warns on PRs without blocking them; promote to a HARD gate
  # in the release workflow once a real minisign key is set.
  updater-key-check:
    name: Release readiness (updater signing key)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Reject placeholder updater pubkey
        run: |
          if grep -q 'TODO_REPLACE_WITH_WINSTT_MINISIGN_PUBKEY' src-tauri/tauri.conf.json; then
            echo "::warning::updater.pubkey is still the TODO placeholder — run 'cargo tauri signer generate', set plugins.updater.pubkey + TAURI_SIGNING_PRIVATE_KEY before enabling production auto-updates."
            exit 1
          fi
          echo "updater pubkey is set."

name: Rust CI

# Real CI for the Rust + Tauri port. The renderer lives in src/ and the
# backend crate in src-tauri/ — the old ci.yml targeted the now-deleted
# reference frontend/ + server/ dirs, so the ~58k-LOC crate and its 62
# Rust test files never ran. This gates fmt + clippy + tests on the
# shipped code so a broken Rust commit can't merge green.
#
# Path-gated on src-tauri/** (the crate) + this workflow file so renderer-
# only PRs don't pay the (slow, link-dominated) cargo build.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src-tauri/**"
      - "tools/windows/**"
      - "tools/linux/**"
      - "tools/macos/**"
      - "tools/tauri-ci-artifacts.conf.json"
      - ".github/workflows/rust-ci.yml"
  pull_request:
    paths:
      - "src-tauri/**"
      - "tools/windows/**"
      - "tools/linux/**"
      - "tools/macos/**"
      - "tools/tauri-ci-artifacts.conf.json"
      - ".github/workflows/rust-ci.yml"

# Cancel superseded runs on the same ref — a fresh push obsoletes the
# prior pipeline immediately.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # windows-latest mirrors the DirectML shipped target. The macOS/Linux CPU
  # targets are covered by the cross-platform matrix below.
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      # Cache the src-tauri target dir keyed on the crate. The crate's link
      # step dominates rebuild time, so a warm target is a large speedup.
      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Reset stale native build cache
        shell: pwsh
        run: |
          $paths = @(
            "src-tauri\target\sherpa-onnx-prebuilt",
            "src-tauri\target\debug\build\sherpa-onnx-*",
            "src-tauri\target\debug\.fingerprint\sherpa-onnx-*",
            "src-tauri\target\release\build\sherpa-onnx-*",
            "src-tauri\target\release\.fingerprint\sherpa-onnx-*",
            "src-tauri\target\debug\build\ort-sys-*",
            "src-tauri\target\debug\.fingerprint\ort-sys-*",
            "src-tauri\target\release\build\ort-sys-*",
            "src-tauri\target\release\.fingerprint\ort-sys-*"
          )
          foreach ($path in $paths) {
            Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
          }

      # bun for any renderer setup tauri codegen leans on. We don't run the
      # frontend gate here (that's the renderer's own workflow); this just
      # makes `bun` available if a build invokes it via beforeBuildCommand.
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.6"

      - name: Add LLVM linker to PATH
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path "$llvm\lld-link.exe")) {
            throw "lld-link.exe not found at $llvm"
          }
          Add-Content -Path $env:GITHUB_PATH -Value $llvm
          Add-Content -Path $env:GITHUB_ENV -Value "LIBCLANG_PATH=$llvm"

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        working-directory: src-tauri
        shell: pwsh
        run: |
          # The test exe runs from target/debug/deps/, but the native ort /
          # onnxruntime / sherpa-onnx DLLs land in target/debug/. Put that on
          # PATH so the test harness can load them (else STATUS_ENTRYPOINT_NOT_FOUND).
          $env:PATH = "$PWD\target\debug;$env:PATH"
          cargo test --locked

  # Optional packaged build of the shipped Windows artifacts. It surfaces a
  # broken release bundle without bricking PRs on hosted-runner hiccups.
  # Promote to a hard gate once it's reliably green.
  build:
    name: Windows artifacts (optional)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Reset stale native build cache
        shell: pwsh
        run: |
          $paths = @(
            "src-tauri\target\sherpa-onnx-prebuilt",
            "src-tauri\target\debug\build\sherpa-onnx-*",
            "src-tauri\target\debug\.fingerprint\sherpa-onnx-*",
            "src-tauri\target\release\build\sherpa-onnx-*",
            "src-tauri\target\release\.fingerprint\sherpa-onnx-*",
            "src-tauri\target\debug\build\ort-sys-*",
            "src-tauri\target\debug\.fingerprint\ort-sys-*",
            "src-tauri\target\release\build\ort-sys-*",
            "src-tauri\target\release\.fingerprint\ort-sys-*"
          )
          foreach ($path in $paths) {
            Remove-Item -Recurse -Force $path -ErrorAction SilentlyContinue
          }

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        shell: pwsh
        run: |
          bun install --frozen-lockfile
          if ($LASTEXITCODE -ne 0) {
            bun pm cache rm
            bun install --frozen-lockfile
          }
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Build the same single-file Windows exe the release workflow uploads.
      # Updater artifacts are disabled for CI so this does not need the
      # minisign private key.
      - name: Tauri Windows bundle
        shell: pwsh
        run: tools\windows\tauri-build.ps1 -Bundles nsis -Config tools\tauri-ci-artifacts.conf.json

      - name: Collect portable Windows artifacts
        shell: pwsh
        run: tools\windows\tauri-portable.ps1 -SkipBuild

      - name: Upload Windows build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: winstt-windows-x64
          if-no-files-found: error
          path: |
            dist/WinSTT.exe
            dist/WinSTT-portable.zip

  linux-artifacts:
    name: Linux artifacts (AppImage / deb / rpm, optional)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux Tauri dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            fuse \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libfuse2 \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            librsvg2-dev \
            libssl-dev \
            libvulkan-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            rpm \
            wget \
            xdg-utils

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"
          key: ci-linux-artifacts

      - name: Reset stale native build cache
        run: |
          rm -rf \
            src-tauri/target/sherpa-onnx-prebuilt \
            src-tauri/target/debug/build/sherpa-onnx-* \
            src-tauri/target/debug/.fingerprint/sherpa-onnx-* \
            src-tauri/target/release/build/sherpa-onnx-* \
            src-tauri/target/release/.fingerprint/sherpa-onnx-* \
            src-tauri/target/debug/build/ort-sys-* \
            src-tauri/target/debug/.fingerprint/ort-sys-* \
            src-tauri/target/release/build/ort-sys-* \
            src-tauri/target/release/.fingerprint/ort-sys-*

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        run: bun install --frozen-lockfile

      - name: Build Linux artifacts
        run: bash tools/linux/tauri-bundles.sh

      - name: Upload Linux build artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: winstt-linux-x64
          if-no-files-found: error
          path: dist/linux/*

  cross-platform:
    name: Cross-platform (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            libgtk-layer-shell-dev \
            librsvg2-dev \
            libssl-dev \
            libvulkan-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            pkg-config \
            wget

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Reset stale native build cache
        run: |
          rm -rf \
            src-tauri/target/sherpa-onnx-prebuilt \
            src-tauri/target/debug/build/sherpa-onnx-* \
            src-tauri/target/debug/.fingerprint/sherpa-onnx-* \
            src-tauri/target/release/build/sherpa-onnx-* \
            src-tauri/target/release/.fingerprint/sherpa-onnx-* \
            src-tauri/target/debug/build/ort-sys-* \
            src-tauri/target/debug/.fingerprint/ort-sys-* \
            src-tauri/target/release/build/ort-sys-* \
            src-tauri/target/release/.fingerprint/ort-sys-*

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.6"

      - name: Install renderer dependencies
        run: |
          bun install --frozen-lockfile || {
            bun pm cache rm
            bun install --frozen-lockfile
          }

      - name: Build renderer
        run: bun run build

      - name: Format check
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Rust check
        working-directory: src-tauri
        run: cargo check --all-targets --locked

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test --locked

      - name: Tauri build (no bundle)
        run: bun run tauri build --no-bundle

  # cargo-deny: advisory (RustSec CVE) + license + bans audit of the crate's
  # dependency tree. Config lives in src-tauri/deny.toml. Pointed at the crate
  # manifest dir since the Cargo workspace lives under src-tauri/.
  cargo-deny:
    name: Dependency audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@bb137d7af7e4fb67e5f82a49c4fce4fad40782fe # v2
        with:
          manifest-path: src-tauri/Cargo.toml
          command: check advisories licenses bans sources

  # Release-readiness guard: the GitHub repo slug must be the owned namespace.
  # The earlier reference frontend pointed updater / user-agent / docs URLs at
  # the unowned `winstt/WinSTT` slug — a stranger's update check would hit the
  # wrong repo. Fails the build if that slug survives anywhere a release URL is
  # built. Matched case-insensitively so `winstt/winstt` variants are caught too.
  repo-slug-check:
    name: Release readiness (repo namespace)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Reject unowned repo slug
        run: |
          if grep -rinE 'winstt/winstt' \
            src-tauri/tauri.conf.json \
            src-tauri/src \
            tools \
            docs/src; then
            echo "::error::Found the unowned 'winstt/WinSTT' repo slug above. Release/update/user-agent URLs must point at 'dahshury/WinSTT'."
            exit 1
          fi
          echo "No unowned repo slug found."

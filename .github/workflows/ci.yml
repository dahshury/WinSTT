name: CI

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "packages/**"
      - "test/**"
      - "messages/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "knip.json"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "packages/**"
      - "test/**"
      - "messages/**"
      - "scripts/**"
      - "package.json"
      - "bun.lock"
      - "bunfig.toml"
      - "knip.json"
      - "eslint.config.*"
      - ".prettierrc*"
      - "tsconfig*"
      - ".github/workflows/ci.yml"

# Cancel superseded runs on the same ref. PR pushes especially benefit
# — a fresh commit obsoletes the prior pipeline immediately.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Renderer (src/) lint + i18n parity + build. The Rust + Tauri port's
  # renderer lives in src/ — the old jobs targeted the now-deleted reference
  # frontend/ + server/ dirs. Backend (src-tauri/) CI is in rust-ci.yml.
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.6"

      # Bun's install cache. Keyed on bun.lock so a dep bump invalidates
      # cleanly; the restore-keys prefix reuses cache layers across lockfile
      # changes within the same OS image.
      - name: Cache Bun install
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (ESLint)
        run: bun run lint

      - name: TypeScript typecheck
        run: bun run typecheck

      # Renderer + model-picker unit/integration suite. `bun run test` fans out
      # across src/ slices and packages/ — gating it here means a red test can
      # no longer merge green (the suite was a manual-only net before).
      - name: Unit tests
        run: bun run test

      - name: Dead-code check
        run: bun run check:deadcode

      # Prettier check scoped to the renderer. We don't reuse the
      # `format:check` script because it also runs `cargo fmt` (covered by
      # rust-ci.yml) which isn't set up on this Bun-only runner.
      - name: Format check
        run: bunx prettier --check src

      # i18n key parity across all 20 locale baselines vs messages/en.json.
      # Default mode (no --strict) only fails on missing keys, not on
      # English-equal values, so seeded baselines still pass.
      - name: i18n parity check
        run: bun run check:i18n

      # Renderer bundle smoke. `build` re-runs the tsgo typecheck as part of the
      # local developer contract; the explicit typecheck step above gives CI a
      # focused TypeScript failure before the bundle work starts.
      - name: Build renderer
        run: bun run build

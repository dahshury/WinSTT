openapi: "3.1.0"
info:
  title: WinSTT Protocol
  version: "0.1.0"
  description: >
    Single source of truth for all WinSTT types: STT WebSocket events,
    control commands, settings schemas, and IPC payloads.

paths: {}

components:
  schemas:
    # ─── Data Channel Events (Server → Client) ────────────────────────

    DataEvent:
      discriminator:
        propertyName: type
        mapping:
          realtime: "#/components/schemas/RealtimeTextEvent"
          fullSentence: "#/components/schemas/FullSentenceEvent"
          recording_start: "#/components/schemas/RecordingStartEvent"
          recording_stop: "#/components/schemas/RecordingStopEvent"
          no_audio_detected: "#/components/schemas/NoAudioDetectedEvent"
          loopback_started: "#/components/schemas/LoopbackStartedEvent"
          loopback_stopped: "#/components/schemas/LoopbackStoppedEvent"
          device_switch_failed: "#/components/schemas/DeviceSwitchFailedEvent"
          vad_detect_start: "#/components/schemas/VadDetectStartEvent"
          vad_detect_stop: "#/components/schemas/VadDetectStopEvent"
          transcription_start: "#/components/schemas/TranscriptionStartEvent"
          wakeword_detected: "#/components/schemas/WakewordDetectedEvent"
          wakeword_detection_start: "#/components/schemas/WakewordDetectionStartEvent"
          wakeword_detection_end: "#/components/schemas/WakewordDetectionEndEvent"
          start_turn_detection: "#/components/schemas/TurnDetectionStartEvent"
          stop_turn_detection: "#/components/schemas/TurnDetectionStopEvent"
          model_download_start: "#/components/schemas/ModelDownloadStartEvent"
          model_download_progress: "#/components/schemas/ModelDownloadProgressEvent"
          model_download_complete: "#/components/schemas/ModelDownloadCompleteEvent"
          audio_level: "#/components/schemas/AudioLevelEvent"
          speaker_segments: "#/components/schemas/SpeakerSegmentsEvent"
          tts_chunk: "#/components/schemas/TtsChunkEvent"
          tts_complete: "#/components/schemas/TtsCompleteEvent"
          tts_failed: "#/components/schemas/TtsFailedEvent"
          tts_model_download_start: "#/components/schemas/TtsModelDownloadStartEvent"
          tts_model_download_progress: "#/components/schemas/TtsModelDownloadProgressEvent"
          tts_model_download_complete: "#/components/schemas/TtsModelDownloadCompleteEvent"
      oneOf:
        - $ref: "#/components/schemas/RealtimeTextEvent"
        - $ref: "#/components/schemas/FullSentenceEvent"
        - $ref: "#/components/schemas/RecordingStartEvent"
        - $ref: "#/components/schemas/RecordingStopEvent"
        - $ref: "#/components/schemas/NoAudioDetectedEvent"
        - $ref: "#/components/schemas/LoopbackStartedEvent"
        - $ref: "#/components/schemas/LoopbackStoppedEvent"
        - $ref: "#/components/schemas/DeviceSwitchFailedEvent"
        - $ref: "#/components/schemas/VadDetectStartEvent"
        - $ref: "#/components/schemas/VadDetectStopEvent"
        - $ref: "#/components/schemas/TranscriptionStartEvent"
        - $ref: "#/components/schemas/WakewordDetectedEvent"
        - $ref: "#/components/schemas/WakewordDetectionStartEvent"
        - $ref: "#/components/schemas/WakewordDetectionEndEvent"
        - $ref: "#/components/schemas/TurnDetectionStartEvent"
        - $ref: "#/components/schemas/TurnDetectionStopEvent"
        - $ref: "#/components/schemas/ModelDownloadStartEvent"
        - $ref: "#/components/schemas/ModelDownloadProgressEvent"
        - $ref: "#/components/schemas/ModelDownloadCompleteEvent"
        - $ref: "#/components/schemas/AudioLevelEvent"
        - $ref: "#/components/schemas/SpeakerSegmentsEvent"
        - $ref: "#/components/schemas/TtsChunkEvent"
        - $ref: "#/components/schemas/TtsCompleteEvent"
        - $ref: "#/components/schemas/TtsFailedEvent"
        - $ref: "#/components/schemas/TtsModelDownloadStartEvent"
        - $ref: "#/components/schemas/TtsModelDownloadProgressEvent"
        - $ref: "#/components/schemas/TtsModelDownloadCompleteEvent"

    SpeakerSegment:
      type: object
      required: [start, end, speaker]
      properties:
        start:
          type: number
          format: float
          description: Segment start in seconds, relative to utterance start.
        end:
          type: number
          format: float
          description: Segment end in seconds, relative to utterance start.
        speaker:
          type: integer
          description: Stable session-wide speaker id assigned by the online clusterer.

    SpeakerSegmentsEvent:
      type: object
      description: >
        Per-utterance speaker diarization result. Fires immediately after the
        matching ``fullSentence`` event when ``diarization.enabled`` is true
        in the recorder config. ``segments`` may be empty when the audio
        contained no detectable speech; consumers should treat that case as
        "single unknown speaker" and apply a neutral colour rather than
        erroring.
      required: [type, segments]
      properties:
        type:
          type: string
          const: speaker_segments
        segments:
          type: array
          items:
            $ref: "#/components/schemas/SpeakerSegment"

    RealtimeTextEvent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          const: realtime
        text:
          type: string

    FullSentenceEvent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          const: fullSentence
        text:
          type: string

    RecordingStartEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: recording_start

    LoopbackStartedEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: loopback_started
        deviceName:
          type: string

    LoopbackStoppedEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: loopback_stopped

    DeviceSwitchFailedEvent:
      type: object
      description: >
        Emitted by the audio reader thread when a queued input-device switch
        could not open the requested device. The server may fall back to the
        system default; either way, the renderer should revert the user's
        selection and surface the reason as a toast.
      required: [type, requested_index, error_message]
      properties:
        type:
          type: string
          const: device_switch_failed
        requested_index:
          type: integer
        error_message:
          type: string
        fallback_index:
          type: [integer, "null"]

    RecordingStopEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: recording_stop

    NoAudioDetectedEvent:
      type: object
      description: >
        Emitted when a manual stop (e.g. push-to-talk release) finishes
        without producing a transcription because no speech was captured.
      required: [type]
      properties:
        type:
          type: string
          const: no_audio_detected

    VadDetectStartEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: vad_detect_start

    VadDetectStopEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: vad_detect_stop

    TranscriptionStartEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: transcription_start
        audio_bytes_base64:
          type: string
          description: Base64-encoded audio bytes

    WakewordDetectedEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: wakeword_detected

    WakewordDetectionStartEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: wakeword_detection_start

    WakewordDetectionEndEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: wakeword_detection_end

    TurnDetectionStartEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: start_turn_detection

    TurnDetectionStopEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: stop_turn_detection

    ModelDownloadStartEvent:
      type: object
      required: [type, model]
      properties:
        type:
          type: string
          const: model_download_start
        model:
          type: string

    ModelDownloadProgressEvent:
      type: object
      required: [type, model, progress]
      properties:
        type:
          type: string
          const: model_download_progress
        model:
          type: string
        progress:
          type: number
          minimum: 0
          maximum: 1
          description: Download progress as a fraction (0.0 to 1.0)
        downloaded_bytes:
          type: integer
          description: Bytes downloaded so far
        total_bytes:
          type: integer
          description: Total bytes to download
        speed_bps:
          type: number
          description: Download speed in bytes per second
        eta_seconds:
          type: number
          description: Estimated seconds remaining

    ModelDownloadCompleteEvent:
      type: object
      required: [type, model]
      properties:
        type:
          type: string
          const: model_download_complete
        model:
          type: string
        cancelled:
          type: boolean
          description: True if the download was cancelled by the user

    AudioLevelEvent:
      type: object
      required: [type, level]
      properties:
        type:
          type: string
          const: audio_level
        level:
          type: number
          minimum: 0
          maximum: 1
          description: Normalized RMS audio level (0.0 to 1.0)

    # ─── TTS events ────────────────────────────────────────────────────
    # Note: ``tts_chunk`` is also emitted as a binary frame with the JSON
    # metadata in this shape preceded by a uint32 little-endian length and
    # followed by the raw float32 PCM payload. Renderer must accept both
    # binary frames (carries PCM) and JSON frames (carries metadata only,
    # used when tooling logs the stream).

    TtsChunkEvent:
      type: object
      description: >
        One chunk of synthesized audio. When delivered as a JSON message
        only, ``samples`` is omitted — the actual PCM rides on a binary
        WebSocket frame whose JSON header matches this schema.
      required: [type, request_id, sample_rate, seq, is_final]
      properties:
        type:
          type: string
          const: tts_chunk
        request_id:
          type: string
          description: Per-synthesis correlation id chosen by the client.
        sample_rate:
          type: integer
          description: Sample rate of the PCM payload (Hz). Kokoro emits 24000.
        seq:
          type: integer
          description: Monotonic sequence number within this request_id, starting at 0.
        is_final:
          type: boolean
          description: True for the last chunk of the request.
        format:
          type: string
          description: Sample format. Currently always "f32le".
        channels:
          type: integer
          description: Channel count. Currently always 1 (mono).

    TtsCompleteEvent:
      type: object
      description: Fires once after the final ``tts_chunk`` has been emitted.
      required: [type, request_id]
      properties:
        type:
          type: string
          const: tts_complete
        request_id:
          type: string
        cancelled:
          type: boolean
          description: True when the run was stopped via ``tts_cancel``.
        elapsed_ms:
          type: integer
          description: Total wall-clock synthesis time in milliseconds.

    TtsFailedEvent:
      type: object
      required: [type, request_id, reason]
      properties:
        type:
          type: string
          const: tts_failed
        request_id:
          type: string
        reason:
          type: string

    TtsModelDownloadStartEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: tts_model_download_start

    TtsModelDownloadProgressEvent:
      type: object
      required: [type, progress]
      properties:
        type:
          type: string
          const: tts_model_download_progress
        progress:
          type: number
          minimum: 0
          maximum: 1
        downloaded_bytes:
          type: integer
        total_bytes:
          type: integer

    TtsModelDownloadCompleteEvent:
      type: object
      required: [type]
      properties:
        type:
          type: string
          const: tts_model_download_complete
        cancelled:
          type: boolean

    # ─── Control Channel Commands (Client → Server) ───────────────────

    SetParameterCommand:
      type: object
      required: [command, parameter, value]
      properties:
        command:
          type: string
          const: set_parameter
        parameter:
          $ref: "#/components/schemas/AllowedParameter"
        value: {}

    GetParameterCommand:
      type: object
      required: [command, parameter]
      properties:
        command:
          type: string
          const: get_parameter
        parameter:
          $ref: "#/components/schemas/AllowedParameter"
        request_id:
          type: integer

    CallMethodCommand:
      type: object
      required: [command, method]
      properties:
        command:
          type: string
          const: call_method
        method:
          $ref: "#/components/schemas/AllowedMethod"
        args:
          type: array
          items: {}
        kwargs:
          type: object
          additionalProperties: true

    # ─── Control Channel Responses (Server → Client) ──────────────────

    SuccessResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          const: success
        message:
          type: string

    GetParameterResponse:
      type: object
      required: [status, parameter, value]
      properties:
        status:
          type: string
          const: success
        parameter:
          type: string
        value: {}
        request_id:
          type: integer

    ErrorResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          const: error
        message:
          type: string

    # ─── Enums ────────────────────────────────────────────────────────

    AllowedParameter:
      type: string
      enum:
        - model
        - language
        - silero_sensitivity
        - wake_word_activation_delay
        - post_speech_silence_duration
        - listen_start
        - recording_stop_time
        - last_transcription_bytes
        - last_transcription_bytes_b64
        - speech_end_silence_start
        - is_recording
        - use_wake_words
        - silence_timing
        - silence_endpoint_enabled
        - smart_endpoint_enabled
        - detection_speed
        - input_device_index
        - end_of_sentence_detection_pause
        - mid_sentence_detection_pause
        - unknown_sentence_detection_pause
        # Live decoder-bias prompts pushed by installInitialPromptSync on
        # every dictionary / static-prefix / context tail change. Read live
        # by RecorderService._safe_transcribe (main) and at realtime model
        # build time (realtime worker bypasses the prompt per use_prompt=False).
        - initial_prompt
        - initial_prompt_realtime
        # Hot-swappable knobs that previously forced a full server restart
        # via Electron's STARTUP_ONLY_KEYS_LIST. Each is now routed through
        # set_parameter so the recorder updates its config in place and
        # (where needed) triggers an in-place model reload or audio-source
        # reconfigure. See recorder/__init__.py for the facade setters and
        # recorder/application/recorder_service.py for the reconfigure path.
        - onnx_quantization
        - translate_to_english
        - model_unload_timeout_seconds
        - webrtc_sensitivity
        - silero_deactivity_detection
        - always_on_microphone
        - lazy_stream_close
        - lazy_close_timeout_seconds

    AllowedMethod:
      type: string
      enum:
        - set_microphone
        - abort
        - stop
        - clear_audio_queue
        - wakeup
        - shutdown
        - text
        - request_diarization_toggle

    WhisperModel:
      type: string
      enum:
        - tiny
        - tiny.en
        - base
        - base.en
        - small
        - small.en
        - medium
        - medium.en
        - large-v1
        - large-v2
        - large-v3
        - large-v3-turbo

    ComputeType:
      type: string
      enum:
        - default
        - auto
        - int8
        - int8_float16
        - int8_float32
        - int8_bfloat16
        - int16
        - float16
        - float32
        - bfloat16

    DeviceType:
      type: string
      enum:
        - auto
        - cpu

    AcceleratorType:
      type: string
      description: |
        User-facing GPU acceleration preference. `auto` walks the per-OS
        priority list (Windows: OpenVINO > DirectML > CUDA > CPU;
        Linux: OpenVINO > CUDA > ROCm > CPU; macOS: CoreML > CPU).
        Explicit values pin a specific ONNX Runtime execution provider;
        the server falls back to CPU with a log line if the chosen EP
        isn't registered (e.g. `cuda` selected on a DirectML-only build).

        `openvino` is the Intel-optimised path for Intel ARC dGPUs and
        recent Iris Xe / Arc iGPUs — install the `server[openvino]` extra
        and ship the matching `WinSTT-OpenVINO-Portable-<v>.exe` flavor.
        Override the OpenVINO device target via the `OPENVINO_DEVICE`
        env var (`AUTO` / `GPU` / `GPU.0` / `CPU`; default `AUTO`).
      enum:
        - auto
        - cuda
        - directml
        - openvino
        - rocm
        - coreml
        - cpu

    RecorderState:
      type: string
      enum:
        - inactive
        - listening
        - wakeword
        - recording
        - transcribing

    TranscriberBackend:
      type: string
      enum:
        - faster_whisper
        - onnx_asr

    ModelFamily:
      type: string
      enum:
        - whisper
        - lite-whisper
        - nemo
        - gigaam
        - kaldi
        - t-one
        - moonshine
        - cohere
        - sense_voice
        - custom

    ModelInfo:
      type: object
      required: [id, displayName, backend, family, languages, supportsLanguageDetection, sizeLabel, supportsRealtime]
      properties:
        id:
          type: string
        displayName:
          type: string
        backend:
          $ref: "#/components/schemas/TranscriberBackend"
        family:
          $ref: "#/components/schemas/ModelFamily"
        languages:
          type: array
          items:
            type: string
        supportsLanguageDetection:
          type: boolean
        sizeLabel:
          type: string
        supportsRealtime:
          type: boolean
        onnxModelName:
          type: string
          nullable: true
        description:
          type: string
        availableQuantizations:
          type: array
          items:
            type: string
        available:
          type: boolean
          description: |
            `true` for every shipped catalog entry. `false` only for
            user-provided custom-model folders that failed the discovery
            contract — the UI greys these out and shows `errorMessage`
            as a tooltip.
          default: true
        errorMessage:
          type: string
          description: |
            Non-empty only on broken custom-model entries. Surfaces the
            scanner's failure reason (e.g. "missing tokenizer.json") so
            the user can fix their drop without inspecting the folder.
          default: ""
        localPath:
          type: string
          nullable: true
          description: |
            Absolute path to the user-provided model folder for custom
            entries; `null` for shipped catalog rows.
        speedScore:
          type: number
          description: |
            Normalized 0..1 speed score derived from the model's published
            RTFx (log-scaled — the catalog spans ~100×–2000× so a linear
            map would crush every Whisper variant). `0.5` is the "unknown"
            sentinel; the picker hides the speed bar in that case.
          default: 0.5
        accuracyScore:
          type: number
          description: |
            Normalized 0..1 accuracy score derived from the model's
            published WER (HF Open ASR Leaderboard for shipped rows,
            upstream model-card claims for non-leaderboard families).
            `0.5` is the "unknown" sentinel and hides the bar.
          default: 0.5

    LoopbackDevice:
      type: object
      required: [index, name, defaultSampleRate, maxOutputChannels]
      properties:
        index:
          type: integer
        name:
          type: string
        defaultSampleRate:
          type: integer
        maxOutputChannels:
          type: integer

    ListLoopbackDevicesCommand:
      type: object
      required: [command]
      properties:
        command:
          type: string
          const: list_loopback_devices
        request_id:
          type: integer

    InputDevice:
      type: object
      required: [index, name, isDefault]
      properties:
        index:
          type: integer
        name:
          type: string
        isDefault:
          type: boolean
        defaultSampleRate:
          type: integer
        hostApi:
          type: integer
        maxInputChannels:
          type: integer

    ListInputDevicesCommand:
      type: object
      required: [command]
      properties:
        command:
          type: string
          const: list_input_devices
        request_id:
          type: integer

    StartLoopbackCommand:
      type: object
      required: [command, device_index]
      properties:
        command:
          type: string
          const: start_loopback
        device_index:
          type: integer

    StopLoopbackCommand:
      type: object
      required: [command]
      properties:
        command:
          type: string
          const: stop_loopback

    ListModelsCommand:
      type: object
      required: [command]
      properties:
        command:
          type: string
          const: list_models

    ListModelsResponse:
      type: object
      required: [status, command, models]
      properties:
        status:
          type: string
          const: success
        command:
          type: string
          const: list_models
        models:
          type: array
          items:
            $ref: "#/components/schemas/ModelInfo"

    # ─── Settings Schemas ─────────────────────────────────────────────

    ModelSettings:
      type: object
      properties:
        model:
          type: string
        realtimeModel:
          type: string
        language:
          type: string
        computeType:
          $ref: "#/components/schemas/ComputeType"
        device:
          $ref: "#/components/schemas/DeviceType"
        accelerator:
          $ref: "#/components/schemas/AcceleratorType"
        backend:
          $ref: "#/components/schemas/TranscriberBackend"
        onnxQuantization:
          type: string
        beamSize:
          type: integer
          minimum: 1
        beamSizeRealtime:
          type: integer
          minimum: 1
        initialPrompt:
          type: string
        initialPromptRealtime:
          type: string

    QualitySettings:
      type: object
      properties:
        enableRealtimeTranscription:
          type: boolean
        useMainModelForRealtime:
          type: boolean
        realtimeProcessingPause:
          type: number
        initRealtimeAfterSeconds:
          type: number
        earlyTranscriptionOnSilence:
          type: number
        batchSize:
          type: integer
        realtimeBatchSize:
          type: integer
        ensureSentenceStartingUppercase:
          type: boolean
        ensureSentenceEndsWithPeriod:
          type: boolean
        smartEndpoint:
          type: boolean
          description: Use DistilBERT classifier for intelligent speech endpoint detection
        smartEndpointSpeed:
          type: number
          minimum: 0.5
          maximum: 3.0
          description: |
            Multiplier applied to the smart-endpoint silence pause:
            `pause = (model_pause + whisper_pause) * smartEndpointSpeed`.
            HIGHER values mean a LONGER wait before finalizing (more
            patient — tolerates pauses); lower values commit faster.
            Default 2.0 matches the RealtimeSTT reference.
        endOfSentenceDetectionPause:
          type: number
          minimum: 0.1
          maximum: 5.0
          description: |
            Seconds of silence after a sentence-terminator (`.`, `!`, `?`) before
            the recording ends. Used by the toggle-mode silence-timing branch
            when Smart Endpoint is off. Lower values commit short utterances
            faster but cut off pauses; higher values tolerate slower speech.
        midSentenceDetectionPause:
          type: number
          minimum: 0.1
          maximum: 10.0
          description: |
            Seconds of silence after a trailing ellipsis (`...`) before the
            recording ends. The ellipsis is Whisper's "I'm not sure this is
            complete" hint; this pause gives the speaker time to continue.
        unknownSentenceDetectionPause:
          type: number
          minimum: 0.1
          maximum: 5.0
          description: |
            Seconds of silence after speech without a clear terminator before
            the recording ends. The fallback when neither sentence-end nor
            mid-sentence heuristics match.

    AudioSettings:
      type: object
      properties:
        inputDeviceIndex:
          type: integer
          nullable: true
        sampleRate:
          type: integer
        bufferSize:
          type: integer
        sileroSensitivity:
          type: number
          minimum: 0
          maximum: 1
        sileroUseOnnx:
          type: boolean
        sileroDeactivityDetection:
          type: boolean
        webrtcSensitivity:
          type: integer
          minimum: 0
          maximum: 3
        postSpeechSilenceDuration:
          type: number
        minGapBetweenRecordings:
          type: number
        preRecordingBufferDuration:
          type: number
        clamshellMicrophone:
          type: integer
          nullable: true
          description: |
            PyAudio index of the alternate microphone activated when the
            laptop lid is closed (clamshell mode). When set, a platform-
            specific detector polls the OS lid state every few seconds; on
            lid-closed it swaps the active mic to this index and on lid-
            opened it restores the previously-selected `inputDeviceIndex`.
            `null` disables the feature and the detector never starts.
            Detection methods: ioreg on macOS, /proc/acpi/button/lid/ on
            Linux. Windows is deferred — clamshell-with-dock setups are
            uncommon there and Win32 has no equivalent zero-cost probe.

    GeneralSettings:
      type: object
      properties:
        autoStart:
          type: boolean
        minimizeToTray:
          type: boolean
        startMinimized:
          type: boolean
        systemAudioReductionWhileDictating:
          type: integer
          minimum: 0
          maximum: 100
          multipleOf: 20
          description: |
            How much to reduce system playback volume while dictating, as a
            percent reduction. `0` disables the feature (volume untouched);
            `100` fully mutes (volume → 0); intermediate values duck the
            volume to `(100 - value)%` of its previous level. Restored on
            recording stop. Ignored in `listen` mode.
        recordingSound:
          type: boolean
        recordingSoundPath:
          type: string
        fileTranscriptionFormat:
          type: string
          enum: [txt, srt]
        fileTranscriptionSaveLocation:
          type: string
          enum: [auto, ask]
          description: Where to save transcribed files. `auto` saves alongside the source file; `ask` prompts with a save dialog each time.
        recordingMode:
          type: string
          enum: [ptt, toggle, listen, wakeword]
          description: |
            How a recording session is started.
            `ptt` / `toggle` use the hotkey; `listen` passively captures from a
            loopback device; `wakeword` starts a session when the configured
            wake word is heard. After a wake-word trigger the recording ends
            via VAD-based silence detection (same as toggle), then the
            detector resumes waiting for the next utterance.
        manualToggleStop:
          type: boolean
          description: |
            When `true` and `recordingMode` is `toggle`, the recording runs
            continuously from first hotkey press to second hotkey press —
            silence-based VAD stop and silence-timing punctuation tuning are
            both disabled. One press starts, one press stops, one final
            transcription. Useful for long-form dictation where natural
            pauses are common. Ignored in other modes.
        repasteHotkey:
          type: string
          description: |
            Global shortcut that re-pastes the most recent dictation
            transcription into the focused window on demand. Registered as an
            EXCLUSIVE system-wide shortcut: pressing it only triggers WinSTT's
            re-paste and is swallowed app-wide so it never also fires the
            focused app's native binding. Stored in the uiohook-style
            accelerator format (e.g. `LCtrl+LShift+V`); the main process
            converts it to an Electron accelerator at registration. Empty
            string disables the feature.
        loopbackDeviceIndex:
          type: integer
          nullable: true
        wakeWord:
          type: string
          description: |
            Wake word used when `recordingMode` is `wakeword`. Must be one of
            Porcupine's free built-in keywords (e.g. `alexa`, `computer`,
            `jarvis`, `hey google`). Ignored in other recording modes.
        showRecordingOverlay:
          type: boolean
        visualizerSize:
          type: string
          enum: [xs, sm, md, lg, xl]
          description: Overlay-popup visualizer height preset (xs–xl).
        liveTranscriptionDisplay:
          type: string
          enum: [none, in-app, in-pill, both]
          description: |
            Where to render the live transcription preview while a realtime model is producing text.
            `in-app` shows it in the main window's subtitle overlay and transcription feed only.
            `in-pill` shows it under the floating recording pill overlay only.
            `both` shows it in both surfaces.
            `none` hides the live preview everywhere; final transcripts still appear normally.
        visualizerType:
          type: string
          enum: [bar, grid, radial, wave, aura]
        visualizerBarCount:
          type: integer
          minimum: 3
          maximum: 21
        visualizerColor:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        contextAwareness:
          type: boolean
          description: |
            When enabled, the Electron client reads text from the focused window
            via Windows UI Automation immediately before each dictation and feeds
            it to the LLM cleanup step so names and jargon get spelled correctly.
            Off by default; requires an explicit opt-in dialog in the UI because
            the feature reads content from any focused app.
        wordCorrectionThreshold:
          type: number
          format: float
          minimum: 0.0
          maximum: 1.0
          default: 0.18
          description: |
            Maximum acceptable combined score for the deterministic
            custom-word fuzzy corrector that runs on the server
            immediately AFTER ASR and BEFORE the LLM modifier pipeline.
            Lower = stricter (fewer false positives, more genuine
            near-misses left for the LLM to fix). 0.18 matches Handy's
            reference value (see
            `examples/Handy/src-tauri/src/audio_toolkit/text.rs`). The
            word list itself is derived from the existing `dictionary`
            array, using entries whose `replacement` field is empty as
            the canonical vocabulary.

    HotkeySettings:
      type: object
      properties:
        pushToTalkKey:
          type: string
          description: Electron accelerator string

    DictionaryEntry:
      type: object
      required: [id, term]
      description: >-
        A canonical word/name/phrase the user wants Whisper to land on. At
        post-process time we fuzzy-match each transcribed token against every
        dictionary term (Jaro-Winkler + Double Metaphone) and replace the
        closest near-miss with the canonical form. When `replacement` is
        present, the entry is a deterministic replacement pair: occurrences
        of `term` are rewritten to `replacement` after the LLM cleanup pass.
      properties:
        id:
          type: string
        term:
          type: string
          description: The canonical spelling/casing of the term.
        replacement:
          type: string
          description: >-
            Optional. When set, occurrences of `term` in transcribed text are
            replaced with `replacement` (case-insensitive whole-word) after
            the LLM cleanup pass. When absent, the entry is a vocab bias only.

    SnippetEntry:
      type: object
      required: [id, trigger, expansion]
      properties:
        id:
          type: string
        trigger:
          type: string
        expansion:
          type: string

    LlmProvider:
      type: string
      enum: [ollama, openrouter, apple-intelligence]
      description: >-
        Which LLM backend to use for text transformation. `apple-intelligence`
        is only selectable on macOS Apple Silicon (darwin+arm64); the renderer
        hides the option on other platforms but accepts the value if it was
        persisted on a different machine.

    LlmFeatureConfig:
      type: object
      description: >-
        Per-feature provider config. Dictation and transforms each carry their
        own copy, so one can run on Ollama while the other uses OpenRouter
        (or both can share the same provider with different models).
      properties:
        enabled:
          type: boolean
          default: false
          description: >-
            Whether this feature is active. The feature runs iff `enabled` is
            true AND a model is configured for the chosen provider. There is
            no master switch — when both features are off, the LLM subsystem
            is dormant.
        provider:
          $ref: "#/components/schemas/LlmProvider"
        model:
          type: string
          default: ""
          description: Ollama model name (only used when provider is "ollama").
        openrouterModel:
          type: string
          default: ""
          description: >-
            OpenRouter model selection encoded as `modelId` or `modelId@providerSlug`.
            Empty string means "OpenRouter Auto". Only used when provider is "openrouter".
        openrouterFallbackModel:
          type: string
          default: ""
          description: >-
            Optional fallback model. Same encoding as `openrouterModel`. When set,
            the LLM IPC retries with this model if the primary errors or times out.
            Empty string disables fallback.
        reasoningEffort:
          type: string
          enum: [low, medium, high]
          default: medium
          description: >-
            OpenRouter `reasoning.effort` parameter. Only sent when the selected
            model advertises reasoning support via `supported_parameters`.
        verbosity:
          type: string
          enum: [low, medium, high]
          default: medium
          description: >-
            OpenRouter `verbosity` parameter. Only sent when the selected model
            advertises support via `supported_parameters`.
        maxOutputTokens:
          type: integer
          nullable: true
          minimum: 1
          description: >-
            Cap on the response length (`max_tokens`). Null lets the model decide.
            Only sent when the selected model advertises `max_tokens` support.

    LlmDictationConfig:
      allOf:
        - $ref: "#/components/schemas/LlmFeatureConfig"
        - type: object
          properties:
            presets:
              type: array
              default: [{ key: neutral }]
              description: >-
                Ordered list of cleanup presets to apply to dictated text. At
                most one tone preset (neutral/formal/friendly/technical/casual)
                may appear. `level` is only valid for `summarize` and `concise`.
              items:
                $ref: "#/components/schemas/LlmPresetEntry"

    LlmTransformsConfig:
      allOf:
        - $ref: "#/components/schemas/LlmFeatureConfig"
        - type: object
          properties:
            prompts:
              type: array
              description: >-
                User-configurable text transforms triggered by a hotkey on the
                currently-selected text. Each transform carries its own system
                prompt and an optional hotkey. Built-in entries are flagged so
                the UI can show a Reset action instead of Delete.
              items:
                $ref: "#/components/schemas/Transform"

    LlmSettings:
      type: object
      description: >-
        LLM configuration. Per-feature provider/model lives under `dictation`
        and `transforms`; the fields below are shared infrastructure (one
        Ollama instance, one OpenRouter account).
      properties:
        endpoint:
          type: string
          default: "http://localhost:11434"
          description: Ollama endpoint URL — shared across both features.
        openrouterApiKey:
          type: string
          default: ""
          description: OpenRouter API key — shared across both features.
        dictation:
          $ref: "#/components/schemas/LlmDictationConfig"
        transforms:
          $ref: "#/components/schemas/LlmTransformsConfig"
        timeout:
          type: integer
          default: 5000
          description: >-
            Client-side request timeout in milliseconds. Persisted and wired
            through the IPC layer, but currently NOT applied at the network
            layer — local LLMs (Ollama cold start) routinely exceed any finite
            cap, so an abort would silently paste un-processed text. Kept for
            settings/IPC stability.

    Transform:
      type: object
      required: [id, name, prompt]
      properties:
        id:
          type: string
          description: Stable identifier; built-ins use kebab-case slugs (e.g. "polish").
        name:
          type: string
          description: Display name shown in the UI.
        prompt:
          type: string
          description: >-
            Full system prompt sent to the LLM. The user's selected text is
            passed as the user-message turn; the model is instructed to return
            only the transformed text.
        hotkey:
          type: string
          description: >-
            uiohook-style combo string (e.g. "LCtrl+LShift+P"). Empty means
            the transform is reachable only via the Transforms UI / IPC.
          default: ""
        builtin:
          type: boolean
          description: True for transforms seeded by the app (Polish, Prompt Engineer).
          default: false

    LlmPresetKey:
      type: string
      enum:
        - neutral
        - formal
        - friendly
        - technical
        - casual
        - concise
        - summarize
        - reorder
        - restructure
        - rewordForClarity

    LlmPresetLevel:
      type: string
      enum: [light, medium, high]
      description: Intensity level for presets that support it (`summarize`, `concise`).

    LlmPresetEntry:
      type: object
      required: [key]
      properties:
        key:
          $ref: "#/components/schemas/LlmPresetKey"
        level:
          $ref: "#/components/schemas/LlmPresetLevel"

    OllamaModelDetails:
      type: object
      description: |
        Per-model detail metadata returned by Ollama `/api/tags`. Drives the
        picker's family grouping, parameter-size chip, and quantization chip.
      properties:
        format:
          type: string
          description: On-disk format (typically `gguf`).
        family:
          type: string
          description: Primary model family (e.g. `llama`, `qwen`, `gemma`).
        families:
          type: array
          description: All families the model belongs to (multi-family hybrids).
          items:
            type: string
        parameterSize:
          type: string
          description: Parameter count label (e.g. `7B`, `1.2B`, `8x7B`).
        quantizationLevel:
          type: string
          description: Quantization level (e.g. `Q4_K_M`, `Q8_0`, `F16`).

    OllamaModel:
      type: object
      required: [name]
      properties:
        name:
          type: string
        size:
          type: integer
        modifiedAt:
          type: string
          format: date-time
        details:
          $ref: "#/components/schemas/OllamaModelDetails"
        capabilities:
          type: array
          description: |
            Capability strings reported by Ollama's `/api/show` for this
            model: `completion`, `tools`, `thinking`, `vision`, `insert`.
            Used by the renderer to badge reasoning-capable models and by
            the chat-body builder to gate `think: true`. Omitted when the
            catalog couldn't be enriched (older Ollama, /api/show failed).
          items:
            type: string

    OllamaLibraryHit:
      type: object
      required: [name]
      description: |
        A single search hit scraped from ollama.com/search. Represents a model
        family (e.g. `gemma3`) — its individual tags are fetched separately via
        the per-model tags endpoint.
      properties:
        name:
          type: string
          description: Canonical library slug (e.g. `gemma3`, `llama3.2`).
        description:
          type: string
          description: One-line description scraped from the search card.
        pulls:
          type: string
          description: Human-readable pull count (e.g. `1.2M`).
        updated:
          type: string
          description: Human-readable last-updated label (e.g. `2 weeks ago`).
        capabilities:
          type: array
          description: Tag capabilities scraped from the search card (e.g. `tools`, `vision`).
          items:
            type: string

    OllamaLibrarySearchResult:
      type: object
      required: [hits, hasMore, page, query]
      properties:
        hits:
          type: array
          items:
            $ref: "#/components/schemas/OllamaLibraryHit"
        hasMore:
          type: boolean
          description: True when more pages remain — the client can request the next page.
        page:
          type: integer
          description: Zero-based page index of these results.
        query:
          type: string
          description: Echoed query so callers can ignore stale responses.
        error:
          type: string
          description: Set when the scrape failed (network error, parse error). `hits` will be empty.

    OllamaLibraryCatalogResult:
      type: object
      required: [hits]
      description: |
        Full Ollama library catalog scraped from ollama.com/library in one
        shot. Cached aggressively because the library only changes when new
        models are published. The renderer filters this list client-side
        rather than hitting the search endpoint per keystroke.
      properties:
        hits:
          type: array
          items:
            $ref: "#/components/schemas/OllamaLibraryHit"
        error:
          type: string

    OllamaLibraryTag:
      type: object
      required: [name]
      description: A single pullable tag of a library model (e.g. `gemma3:4b`).
      properties:
        name:
          type: string
          description: Full pull tag including base (e.g. `gemma3:4b`, `gemma3:4b-q8_0`).
        sizeBytes:
          type: integer
          format: int64
          description: Approximate on-disk size in bytes (parsed from the `3.3GB`-style label).
        sizeLabel:
          type: string
          description: Raw human-readable size label as shown on ollama.com (e.g. `3.3GB`).
        contextWindow:
          type: string
          description: Context-window label (e.g. `128K`).
        quantization:
          type: string
          description: Quantization marker parsed from the tag suffix (e.g. `Q4_K_M`, `Q8_0`, `fp16`).
        parameterSize:
          type: string
          description: Parameter-size label parsed from the tag (e.g. `4b`, `12b`).
        isLatest:
          type: boolean
          description: True when this is the `latest` alias.

    OllamaLibraryTagsResult:
      type: object
      required: [model, tags]
      properties:
        model:
          type: string
        tags:
          type: array
          items:
            $ref: "#/components/schemas/OllamaLibraryTag"
        error:
          type: string

    OllamaScanResult:
      type: object
      required: [models, reachable]
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/OllamaModel"
        reachable:
          type: boolean
          description: True if the Ollama API responded (even with HTTP error). False if connection failed.
        error:
          type: string
          description: Human-readable failure reason when not reachable or models couldn't be parsed.

    OllamaDetectResult:
      type: object
      required: [installed]
      properties:
        installed:
          type: boolean
          description: True if an `ollama` executable can be located on PATH or in default install locations.
        path:
          type: string
          description: Resolved path to the ollama executable, when installed.

    OllamaPullProgressStatus:
      type: string
      enum:
        - pulling
        - downloading
        - verifying
        - writing
        - success
        - error
        - cancelled
      description: |
        Coalesced status from the streaming `/api/pull` response. The raw status
        text from Ollama is mapped to one of these stages so the UI can render a
        stable progress bar.

    OllamaPullProgress:
      type: object
      required: [model, status]
      description: |
        Streaming progress event for a model pull. Emitted by the Electron main
        process to the renderer over IPC channel `llm:pull-progress`.
      properties:
        model:
          type: string
          description: The fully-qualified model name being pulled (e.g. `llama3.2:1b`).
        status:
          $ref: "#/components/schemas/OllamaPullProgressStatus"
        statusText:
          type: string
          description: Raw status string from Ollama (`pulling manifest`, digest hash, etc.).
        digest:
          type: string
          description: SHA256 digest of the layer currently being downloaded, when applicable.
        completed:
          type: integer
          format: int64
          description: Bytes transferred for the current layer.
        total:
          type: integer
          format: int64
          description: Total bytes for the current layer.
        percent:
          type: number
          minimum: 0
          maximum: 100
          description: Percent of the current layer transferred (0–100).
        error:
          type: string
          description: Human-readable error when status is `error`.

    OllamaPullResult:
      type: object
      required: [success, model]
      properties:
        success:
          type: boolean
        model:
          type: string
        cancelled:
          type: boolean
          description: True when the pull was cancelled by the user.
        error:
          type: string
          description: Human-readable error when `success` is false.

    OllamaDeleteResult:
      type: object
      required: [success, model]
      properties:
        success:
          type: boolean
        model:
          type: string
        error:
          type: string

    RecommendedOllamaModel:
      type: object
      required: [name, displayName, paramSize, sizeBytes, description]
      description: |
        A curated entry shown in the "Recommended" tab of the model manager.
        Restricted to small, fast, instruction-tuned models suitable for the
        text-transformation presets used by WinSTT's LLM post-processing.
      properties:
        name:
          type: string
          description: Ollama model identifier including tag (e.g. `llama3.2:1b`).
        displayName:
          type: string
          description: Human-readable name shown in the UI.
        family:
          type: string
          description: Model family (e.g. `llama`, `gemma`, `qwen`, `phi`).
        paramSize:
          type: string
          description: Parameter count label (e.g. `1.2B`, `3B`).
        sizeBytes:
          type: integer
          format: int64
          description: Approximate on-disk size of the default quantization, in bytes.
        description:
          type: string
        tags:
          type: array
          items:
            type: string
          description: Free-form tags, e.g. `fast`, `tiny`, `instruct`.

    OpenRouterPricing:
      type: object
      description: Pricing per token (string-encoded decimal — OpenRouter format).
      properties:
        prompt:
          type: string
        completion:
          type: string
        request:
          type: string
        image:
          type: string
        web_search:
          type: string
        internal_reasoning:
          type: string
        input_cache_read:
          type: string
        input_cache_write:
          type: string

    OpenRouterEndpoint:
      type: object
      required: [name, model_name, context_length, pricing, provider_name, tag]
      properties:
        name:
          type: string
        model_name:
          type: string
        context_length:
          type: integer
        pricing:
          $ref: "#/components/schemas/OpenRouterPricing"
        provider_name:
          type: string
          description: Human-readable provider (e.g. "DeepInfra", "Together").
        tag:
          type: string
          description: Provider slug used to route requests (e.g. "deepinfra").
        max_completion_tokens:
          type: integer
          nullable: true
        supported_parameters:
          type: array
          items:
            type: string
        quantization:
          type: string
          nullable: true
        status:
          type: integer
          nullable: true
        uptime_last_30m:
          type: number
          nullable: true

    OpenRouterArchitecture:
      type: object
      description: |
        Model architecture metadata returned by the OpenRouter `/api/v1/models`
        listing. Drives the modality chips rendered in the model picker rows.
      properties:
        modality:
          type: string
          description: Legacy single-string modality (e.g. "text->text", "text+image->text").
        tokenizer:
          type: string
        instruct_type:
          type: string
        input_modalities:
          type: array
          description: Modalities the model accepts (e.g. ["text", "image", "audio"]).
          items:
            type: string
        output_modalities:
          type: array
          description: Modalities the model produces (e.g. ["text"], ["embeddings"]).
          items:
            type: string

    OpenRouterModel:
      type: object
      required: [id, name]
      description: A model returned by OpenRouter `/api/v1/models`.
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        context_length:
          type: integer
        pricing:
          $ref: "#/components/schemas/OpenRouterPricing"
        provider:
          type: string
          description: Provider slug (always "openrouter" for top-level catalog entries).
        maker:
          type: string
          description: Model maker (e.g. "openai", "anthropic", "google") parsed from the id.
        model_name:
          type: string
          description: Display name without the maker prefix.
        variant:
          type: string
          enum: [free, extended, exacto, nitro, floor, thinking, online]
          nullable: true
        architecture:
          $ref: "#/components/schemas/OpenRouterArchitecture"
        endpoints:
          type: array
          items:
            $ref: "#/components/schemas/OpenRouterEndpoint"
        supported_parameters:
          type: array
          items:
            type: string

    OpenRouterScanResult:
      type: object
      required: [models, reachable]
      properties:
        models:
          type: array
          items:
            $ref: "#/components/schemas/OpenRouterModel"
        reachable:
          type: boolean
          description: True if the OpenRouter API responded (even with HTTP error). False if connection failed.
        error:
          type: string
          description: Human-readable failure reason when not reachable.

    # ─── Cloud STT integrations ────────────────────────────────────────

    CloudSttProvider:
      type: string
      enum: [openai, elevenlabs]
      description: >-
        Identifier for a cloud STT provider. The renderer-side picker
        persists the colon-prefixed `<provider>:<model_id>` to
        `settings.model.model`, and the main process routes accordingly.

    CloudSttErrorCode:
      type: string
      enum: [auth, network, key_missing, rate_limit, provider_error]
      description: >-
        Stable classification of a cloud STT failure surfaced to the
        renderer. `auth` = the provider rejected the API key.
        `network` = transport-level failure (DNS, TLS, timeout).
        `key_missing` = no API key configured for this provider.
        `rate_limit` = provider returned 429 / quota exceeded.
        `provider_error` = catch-all for any other 4xx/5xx response.

    ProviderIntegrationStatus:
      type: object
      required: [apiKey, verified, lastVerifiedAt]
      description: >-
        Per-provider integration record. `apiKey` is encrypted at rest via
        Electron `safeStorage` (DPAPI on Windows); the wire/in-memory shape
        is plaintext. `verified` is the result of the last successful probe
        (null = never probed); `lastVerifiedAt` is epoch-ms (or null).
      properties:
        apiKey:
          type: string
          default: ""
        verified:
          type: boolean
          nullable: true
          default: null
        lastVerifiedAt:
          type: number
          nullable: true
          default: null

    Integrations:
      type: object
      required: [openai, elevenlabs]
      description: >-
        Per-provider cloud STT integration status. One entry per supported
        provider; entries persist even when `apiKey` is empty so the UI can
        show the most recent probe result on revisit.
      properties:
        openai:
          $ref: "#/components/schemas/ProviderIntegrationStatus"
        elevenlabs:
          $ref: "#/components/schemas/ProviderIntegrationStatus"

    AppSettings:
      type: object
      properties:
        model:
          $ref: "#/components/schemas/ModelSettings"
        quality:
          $ref: "#/components/schemas/QualitySettings"
        audio:
          $ref: "#/components/schemas/AudioSettings"
        general:
          $ref: "#/components/schemas/GeneralSettings"
        hotkey:
          $ref: "#/components/schemas/HotkeySettings"
        dictionary:
          type: array
          items:
            $ref: "#/components/schemas/DictionaryEntry"
        snippets:
          type: array
          items:
            $ref: "#/components/schemas/SnippetEntry"
        llm:
          $ref: "#/components/schemas/LlmSettings"
        integrations:
          $ref: "#/components/schemas/Integrations"

    # ─── Entity Types ─────────────────────────────────────────────────

    TranscriptionItem:
      type: object
      required: [id, type, text, timestamp]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [realtime, final]
        text:
          type: string
        timestamp:
          type: number

    AudioDevice:
      type: object
      required: [index, name, isDefault]
      properties:
        index:
          type: integer
        name:
          type: string
        isDefault:
          type: boolean
        maxInputChannels:
          type: integer
        defaultSampleRate:
          type: integer
        hostApi:
          type: integer
        hostApiName:
          type: string

    GpuInfo:
      type: object
      required: [name, available]
      properties:
        name:
          type: string
        available:
          type: boolean

    # ─── Live resource snapshot ───────────────────────────────────────

    LiveGpuInfo:
      type: object
      description: |
        Per-GPU snapshot from `nvidia-smi`. `total_vram_bytes` is repeated
        from static `SystemInfo` so the renderer can derive used/free
        percentages from a single payload.
      required: [name, total_vram_bytes, used_vram_bytes, free_vram_bytes, utilization_percent]
      properties:
        name:
          type: string
        total_vram_bytes:
          type: integer
          format: int64
        used_vram_bytes:
          type: integer
          format: int64
        free_vram_bytes:
          type: integer
          format: int64
        utilization_percent:
          type: integer
          minimum: -1
          maximum: 100
          description: |
            GPU compute utilization (0..100). `-1` when nvidia-smi did
            not report a value (e.g. driver too old). Renderer treats
            negative values as "unknown" and hides the chip.

    LiveResources:
      type: object
      description: |
        Live host snapshot used by the resource-aware model picker.
        Fields are best-effort; missing probes return zero/empty.
      required:
        - ram_total_bytes
        - ram_available_bytes
        - cpu_count_logical
        - cpu_count_physical
        - cpu_percent
        - gpus
      properties:
        ram_total_bytes:
          type: integer
          format: int64
        ram_available_bytes:
          type: integer
          format: int64
          description: psutil's `virtual_memory().available` — bytes that can be allocated without swapping.
        cpu_count_logical:
          type: integer
          minimum: 0
        cpu_count_physical:
          type: integer
          minimum: 0
        cpu_percent:
          type: number
          minimum: 0
          maximum: 100
          description: |
            Non-blocking system-wide CPU% sample (averaged across logical
            cores). `0.0` on the first call after process start (psutil
            needs a prior sample to delta against) and after `psutil` is
            missing — the renderer treats `0.0` as "no recent reading".
        gpus:
          type: array
          items:
            $ref: "#/components/schemas/LiveGpuInfo"

    # ─── Fit assessment ───────────────────────────────────────────────

    FitSeverity:
      type: string
      description: |
        Three-tier verdict. `ok` renders nothing; `warning` renders an
        inline ⚠ chip; `critical` renders an inline ⛔ chip and triggers
        the post-selection modal that requires "Proceed anyway".
      enum: [ok, warning, critical]

    FitTarget:
      type: string
      description: Predicted device the candidate would run on.
      enum: [gpu, cpu, neither]

    FitReason:
      type: string
      description: |
        Stable i18n keys for why the verdict was reached. The renderer
        maps each value to a localized line in the warning modal.
        Multiple reasons may apply per assessment.
      enum:
        - exceeds_vram
        - exceeds_ram
        - tight_vram
        - tight_ram
        - no_gpu_available
        - requires_cpu_quant
        - stt_already_uses_gpu
        - stt_already_uses_ram
        - unknown_footprint
        - ok

    DictationFitAssessment:
      type: object
      required: [severity, target, required_bytes, available_bytes, reasons]
      properties:
        severity:
          $ref: "#/components/schemas/FitSeverity"
        target:
          $ref: "#/components/schemas/FitTarget"
        required_bytes:
          type: integer
          format: int64
          description: Estimated resident bytes the candidate model would consume.
        available_bytes:
          type: integer
          format: int64
          description: |
            Bytes available on `target` after accounting for what's already
            loaded (and what `target` itself contributes, where applicable).
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/FitReason"

    OllamaFitAssessment:
      type: object
      required: [severity, target, required_bytes, available_bytes, reasons]
      properties:
        severity:
          $ref: "#/components/schemas/FitSeverity"
        target:
          $ref: "#/components/schemas/FitTarget"
        required_bytes:
          type: integer
          format: int64
          description: |
            `size_bytes * 1.2 + 1 GB` — accounts for KV cache and activations
            beyond the raw GGUF weight file.
        available_bytes:
          type: integer
          format: int64
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/FitReason"

    GetLiveResourcesCommand:
      type: object
      required: [command]
      properties:
        command:
          type: string
          const: get_live_resources
        force_refresh:
          type: boolean
          default: false
          description: Bypass the ~1s TTL cache (wire to a manual "refresh" button).
        request_id:
          type: integer

    AssessDictationModelFitCommand:
      type: object
      required: [command, model_id]
      properties:
        command:
          type: string
          const: assess_dictation_model_fit
        model_id:
          type: string
        quantization:
          type: string
          default: ""
        device:
          type: string
          nullable: true
        request_id:
          type: integer

    AssessOllamaModelFitCommand:
      type: object
      required: [command, size_bytes]
      properties:
        command:
          type: string
          const: assess_ollama_model_fit
        size_bytes:
          type: integer
          format: int64
        request_id:
          type: integer

    ServerStatus:
      type: string
      enum:
        - idle
        - starting
        - running
        - error

    ConnectionStatus:
      type: string
      enum:
        - disconnected
        - connecting
        - connected
        - error

    # ─── Audio Frame Metadata ─────────────────────────────────────────

    AudioFrameMetadata:
      type: object
      required: [sampleRate]
      properties:
        sampleRate:
          type: integer

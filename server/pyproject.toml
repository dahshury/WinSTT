[project]
name = "winstt-server"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "kink>=0.6.5,<0.7",
    "pydantic>=2.0",
    "PyAudio>=0.2.14",
    "PyAudioWPatch>=0.2.12",
    "faster-whisper>=1.1.1",
    "pvporcupine>=1.9.5",
    "webrtcvad-wheels>=2.0.14",
    "torch",
    "torchaudio",
    "scipy>=1.15.2",
    "openwakeword>=0.4.0",
    "numpy",
    "soundfile>=0.13.1",
    "rich>=13.0",
    "keyboard>=0.13.5",
    "pyautogui>=0.9.54",
    "pyperclip>=1.8",
    "colorama>=0.4.6",
    "websockets>=16.0",
    "onnx-asr[hub]",
    # transformers v5 ships breaking renames in tokenizer/model APIs; pin to v4
    # until DistilBertForSequenceClassification/DistilBertTokenizerFast usage in
    # `distilbert_classifier.py` is verified against v5.
    "transformers>=4.30,<5",
]

[dependency-groups]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.0",
    "mypy>=1.8",
    "ruff>=0.3",
    "pre-commit>=3.0",
]

[[tool.uv.index]]
name = "pytorch-cu128"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv]
link-mode = "copy"

[tool.uv.sources]
torch = [{ index = "pytorch-cu128" }]
torchaudio = [{ index = "pytorch-cu128" }]
onnx-asr = { path = "../examples/onnx-asr", editable = true }

[project.scripts]
stt-server = "src.stt_server.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E","W","F","I","UP","B","SIM","ANN","RUF"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_generics = true
disallow_untyped_calls = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["pyaudio.*","pyaudiowpatch.*","webrtcvad.*","pvporcupine.*","openwakeword.*","faster_whisper.*","torch.*","torchaudio.*","scipy.*","soundfile.*","websocket.*","websockets.*","colorama.*","tqdm.*","huggingface_hub.*","onnx_asr.*","onnxruntime.*","transformers.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = "-v --cov=src --cov-report=term-missing --no-cov-on-fail --strict-markers"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
omit = [
    "tests/*",
    "src/building_blocks/terminal.py",
    "src/recorder/infrastructure/*",
    "src/recorder/bootstrap.py",
    "src/recorder/client.py",
    "src/stt_server/*",
]

[tool.coverage.report]
fail_under = 100
show_missing = true
exclude_also = [
    "^\\s*\\.\\.\\.\\s*$",
    "pragma: no cover",
]

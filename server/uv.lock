[[package]]
name = "winstt-server"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "colorama" },
    { name = "keyboard" },
    { name = "kink" },
    { name = "numpy" },
    { name = "onnx-asr", extra = ["hub"] },
    { name = "openwakeword" },
    { name = "psutil" },
    { name = "pvporcupine" },
    { name = "pyaudio" },
    { name = "pyaudiowpatch" },
    { name = "pyautogui" },
    { name = "pydantic" },
    { name = "pyperclip" },
    { name = "rich" },
    { name = "scipy" },
    { name = "soundfile" },
    { name = "webrtcvad-wheels" },
    { name = "websockets" },
]

[package.optional-dependencies]
cpu = [
    { name = "onnxruntime" },
]
gpu = [
    { name = "nvidia-cublas-cu12" },
    { name = "nvidia-cuda-nvrtc-cu12" },
    { name = "nvidia-cuda-runtime-cu12" },
    { name = "nvidia-cudnn-cu12" },
    { name = "nvidia-cufft-cu12" },
    { name = "nvidia-curand-cu12" },
    { name = "nvidia-cusolver-cu12" },
    { name = "nvidia-cusparse-cu12" },
    { name = "onnxruntime-gpu" },
]
sentence-classifier = [
    { name = "torch" },
    { name = "transformers" },
]

[package.dev-dependencies]
dev = [
    { name = "mypy" },
    { name = "pre-commit" },
    { name = "pyinstaller" },
    { name = "pyinstaller-hooks-contrib" },
    { name = "pytest" },
    { name = "pytest-cov" },
    { name = "ruff" },
]

[package.metadata]
requires-dist = [
    { name = "colorama", specifier = ">=0.4.6" },
    { name = "keyboard", specifier = ">=0.13.5" },
    { name = "kink", specifier = ">=0.6.5,<0.7" },
    { name = "numpy" },
    { name = "nvidia-cublas-cu12", marker = "extra == 'gpu'", specifier = ">=12.4" },
    { name = "nvidia-cuda-nvrtc-cu12", marker = "extra == 'gpu'", specifier = ">=12.4" },
    { name = "nvidia-cuda-runtime-cu12", marker = "extra == 'gpu'", specifier = ">=12.4" },
    { name = "nvidia-cudnn-cu12", marker = "extra == 'gpu'", specifier = ">=9.0" },
    { name = "nvidia-cufft-cu12", marker = "extra == 'gpu'", specifier = ">=11.0" },
    { name = "nvidia-curand-cu12", marker = "extra == 'gpu'", specifier = ">=10.3" },
    { name = "nvidia-cusolver-cu12", marker = "extra == 'gpu'", specifier = ">=11.0" },
    { name = "nvidia-cusparse-cu12", marker = "extra == 'gpu'", specifier = ">=12.0" },
    { name = "onnx-asr", extras = ["hub"], editable = "../examples/onnx-asr" },
    { name = "onnxruntime", marker = "extra == 'cpu'", specifier = ">=1.18.1" },
    { name = "onnxruntime-gpu", marker = "extra == 'gpu'", specifier = ">=1.18.1" },
    { name = "openwakeword", specifier = ">=0.4.0" },
    { name = "psutil", specifier = ">=5.9" },
    { name = "pvporcupine", specifier = ">=1.9.5" },
    { name = "pyaudio", specifier = ">=0.2.14" },
    { name = "pyaudiowpatch", specifier = ">=0.2.12" },
    { name = "pyautogui", specifier = ">=0.9.54" },
    { name = "pydantic", specifier = ">=2.0" },
    { name = "pyperclip", specifier = ">=1.8" },
    { name = "rich", specifier = ">=13.0" },
    { name = "scipy", specifier = ">=1.15.2" },
    { name = "soundfile", specifier = ">=0.13.1" },
    { name = "torch", marker = "extra == 'sentence-classifier'", specifier = ">=2.0" },
    { name = "transformers", marker = "extra == 'sentence-classifier'", specifier = ">=4.30,<5" },
    { name = "webrtcvad-wheels", specifier = ">=2.0.14" },
    { name = "websockets", specifier = ">=16.0" },
]
provides-extras = ["cpu", "gpu", "sentence-classifier"]

[package.metadata.requires-dev]
dev = [
    { name = "mypy", specifier = ">=1.8" },
    { name = "pre-commit", specifier = ">=3.0" },
    { name = "pyinstaller", specifier = ">=6.5" },
    { name = "pyinstaller-hooks-contrib", specifier = ">=2024.7" },
    { name = "pytest", specifier = ">=7.4" },
    { name = "pytest-cov", specifier = ">=4.0" },
    { name = "ruff", specifier = ">=0.3" },
]

[[package]]
name = "winstt-server"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "kink" },
    { name = "numpy" },
    { name = "onnx" },
    { name = "onnx-asr", extra = ["hub"] },
    { name = "openwakeword" },
    { name = "psutil" },
    { name = "pvporcupine" },
    { name = "pyaudio" },
    { name = "pyaudiowpatch" },
    { name = "pydantic" },
    { name = "scipy" },
    { name = "sentry-sdk" },
    { name = "soundfile" },
    { name = "webrtcvad-wheels" },
    { name = "websockets" },
]

[package.optional-dependencies]
cpu = [
    { name = "onnxruntime" },
]
gpu = [
    { name = "nvidia-cublas-cu12" },
    { name = "nvidia-cuda-nvrtc-cu12" },
    { name = "nvidia-cuda-runtime-cu12" },
    { name = "nvidia-cudnn-cu12" },
    { name = "nvidia-cufft-cu12" },
    { name = "nvidia-curand-cu12" },
    { name = "nvidia-cusolver-cu12" },
    { name = "nvidia-cusparse-cu12" },
    { name = "nvidia-nvjitlink-cu12" },
    { name = "onnxruntime-gpu" },
]
sentence-classifier = [
    { name = "torch" },
    { name = "transformers" },
]

[package.dev-dependencies]
dev = [
    { name = "mypy" },
    { name = "pre-commit" },
    { name = "pyinstaller" },
    { name = "pyinstaller-hooks-contrib" },
    { name = "pytest" },
    { name = "pytest-cov" },
    { name = "rich" },
    { name = "ruff" },
]


<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>WinSTT</title>
		<style>
			:root{
			 --color-splash-surface:#0b0b0e;
			 --color-splash-border:#1f1f25;
			 --color-splash-text:#a1a1aa;
			 --color-splash-text-strong:#fff;
			 --color-splash-text-subtle:#71717a;
			 --color-splash-track:#1c1c22;
			 --color-splash-accent:#8b5cf6;
			 --color-splash-accent-soft:#a78bfa;
			 --shadow-splash-card:0 18px 50px -12px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.02);
			 --shadow-splash-logo:0 4px 16px rgba(139,92,246,.45)}
			*{margin:0;padding:0;box-sizing:border-box}
			html,body{width:100%;height:100%;background:transparent;overflow:hidden;cursor:default;
			 -webkit-user-select:none;user-select:none;
			 font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
			body{display:flex;align-items:center;justify-content:center}
			.card{width:236px;padding:30px 28px 26px;display:flex;flex-direction:column;align-items:center;gap:16px;
			 background:var(--color-splash-surface);border:1px solid var(--color-splash-border);border-radius:18px;
			 box-shadow:var(--shadow-splash-card);
			 animation:fade .28s ease-out}
			@keyframes fade{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
			body.is-closing .card{animation:splash-out .18s ease-in forwards}
			@keyframes splash-out{to{opacity:0;filter:blur(2px);transform:translateY(-4px) scale(.98)}}
			.logo{width:76px;height:76px;object-fit:contain;
			 filter:drop-shadow(var(--shadow-splash-logo))}
			.word{position:relative;display:inline-block;font-family:ui-monospace,'Cascadia Code','Consolas',monospace;font-weight:600;font-size:13px;
			 letter-spacing:.28em;text-indent:.28em;color:var(--color-splash-text);text-transform:uppercase}
			.word::before{position:absolute;inset:0;content:attr(data-text);color:transparent;
			 background:linear-gradient(90deg,var(--color-splash-text) 0%,var(--color-splash-text) 36%,var(--color-splash-text-strong) 50%,var(--color-splash-text) 64%,var(--color-splash-text) 100%);
			 background-size:300% 100%;-webkit-background-clip:text;background-clip:text;
			 animation:t-shimmer 1.8s linear infinite}
			@keyframes t-shimmer{0%{background-position:150% 0}100%{background-position:-150% 0}}
			.track{position:relative;width:160px;height:3px;border-radius:99px;background:var(--color-splash-track);overflow:hidden}
			.bar{position:absolute;top:0;height:100%;width:0%;border-radius:99px;
			 background:linear-gradient(90deg,var(--color-splash-accent),var(--color-splash-accent-soft));transition:width .28s ease}
			.hint,.phase{font-size:11px;letter-spacing:.04em;color:var(--color-splash-text-subtle);text-align:center;min-height:14px}
			@media (prefers-reduced-motion:reduce){.card,.logo,.word::before{animation:none!important}}
		</style>
	</head>
	<body>
		<div class="card">
			<img class="logo" src="/icon.png" alt="" />
			<div class="word" data-text="WinSTT">WinSTT</div>
			<div class="track"><div class="bar"></div></div>
			<div class="hint" id="progress-text">Starting…</div>
			<div class="phase" id="progress-phase"></div>
		</div>
	</body>
</html>

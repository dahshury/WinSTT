<!doctype html><html><head><meta charset="utf-8" /><style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:transparent;overflow:hidden;cursor:default;
 -webkit-user-select:none;user-select:none;
 font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif}
body{display:flex;align-items:center;justify-content:center}
.card{width:432px;padding:18px 18px 16px;display:flex;flex-direction:column;gap:13px;
 background:#0b0b0e;border:1px solid #1f1f25;border-radius:18px;position:relative;overflow:hidden;
 box-shadow:0 18px 50px -12px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.02);
 animation:fade .28s ease-out}
@keyframes fade{from{opacity:0;transform:scale(.97)}to{opacity:1;transform:scale(1)}}
/* Header: brand mark + wordmark */
.head{display:flex;align-items:center;gap:9px}
.logo{width:26px;height:26px;object-fit:contain;
 filter:drop-shadow(0 3px 10px rgba(139,92,246,.45));animation:breathe 2.4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-2px) scale(1.04)}}
.word{font-family:ui-monospace,'Cascadia Code','Consolas',monospace;font-weight:600;font-size:12px;
 letter-spacing:.26em;text-indent:.26em;color:#e4e4e7;text-transform:uppercase}
.tag{margin-left:auto;font-size:10px;letter-spacing:.16em;color:#52525b;text-transform:uppercase}
/* Carousel stage */
.stage{position:relative;width:100%;aspect-ratio:3/2;border-radius:12px;overflow:hidden;
 background:#08080a;border:1px solid #18181d}
.track{display:flex;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,0,.2,1)}
.slide{position:relative;flex:0 0 100%;height:100%}
.slide img{width:100%;height:100%;object-fit:cover;object-position:top left;display:block}
.slide .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;
 color:#3f3f46;font-size:11px;letter-spacing:.1em}
.cap{position:absolute;left:0;right:0;bottom:0;padding:30px 14px 11px;text-align:left;
 background:linear-gradient(to top,rgba(8,8,10,.95) 8%,rgba(8,8,10,.72) 48%,transparent)}
.cap .t{font-size:13px;font-weight:650;color:#fafafa;letter-spacing:.005em}
.cap .s{margin-top:2px;font-size:11px;line-height:1.35;color:#a1a1aa}
/* Story-style segment indicators (double as per-slide autoplay progress) */
.segs{display:flex;gap:5px;padding:0 1px}
.seg{position:relative;flex:1;height:3px;border-radius:99px;background:#26262d;overflow:hidden}
.seg .f{position:absolute;inset:0;width:0;border-radius:99px;
 background:linear-gradient(90deg,#8b5cf6,#a78bfa)}
.seg.done .f{width:100%}
.seg.active .f{width:100%;transition:width var(--int) linear}
/* Footer status line */
.foot{display:flex;align-items:center;gap:8px;min-height:15px}
.pulse{width:6px;height:6px;border-radius:99px;background:#8b5cf6;flex:0 0 auto;
 box-shadow:0 0 0 0 rgba(139,92,246,.5);animation:pulse 1.4s ease-out infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(139,92,246,.45)}70%{box-shadow:0 0 0 6px rgba(139,92,246,0)}
 100%{box-shadow:0 0 0 0 rgba(139,92,246,0)}}
.status{font-size:11px;letter-spacing:.02em;color:#a1a1aa;white-space:nowrap;overflow:hidden;
 text-overflow:ellipsis;transition:opacity .2s ease}
/* Optional determinate progress edge (model download %) — hidden until set */
.edge{position:absolute;left:0;bottom:0;height:2px;width:0;
 background:linear-gradient(90deg,#8b5cf6,#a78bfa);transition:width .25s ease;opacity:0}
.edge.on{opacity:1}
@media (prefers-reduced-motion:reduce){
 .logo,.pulse{animation:none}.track{transition:none}.seg.active .f{transition:none;width:100%}}

<script>(function(){
 var n=3,int=3000,i=0;
 var track=document.getElementById('track');
 var segs=[].slice.call(document.querySelectorAll('.seg'));
 var statusEl=document.getElementById('status');
 var edge=document.getElementById('edge');
 function paint(){
  if(track)track.style.transform='translateX(-'+(i*100)+'%)';
  for(var k=0;k<segs.length;k++){
   segs[k].classList.remove('active','done');
   if(k<i)segs[k].classList.add('done');
  }
  var cur=segs[i];
  if(cur){void cur.offsetWidth;cur.classList.add('active');}
 }
 function next(){i=(i+1)%n;paint();}
 paint();
 if(n>1)setInterval(next,int);
 window.__winsttSplash={
  setStatus:function(t){if(statusEl){statusEl.style.opacity='0';
   setTimeout(function(){statusEl.textContent=String(t||'');statusEl.style.opacity='1';},160);}},
  setProgress:function(f){if(!edge)return;
   if(f===null||f===undefined||isNaN(f)){edge.classList.remove('on');edge.style.width='0';return;}
   var p=Math.max(0,Math.min(1,Number(f)));edge.classList.add('on');edge.style.width=(p*100)+'%';}
 };

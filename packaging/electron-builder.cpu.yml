appId: com.winstt.app
productName: WinSTT
# afterPack hook trims unused Chromium locale .pak files (saves ~30 MB).
# Note: afterPack is resolved from the repo root (electron-builder's
# launch CWD), not from projectDir — so the path reaches into frontend/
# explicitly. extraResources.from below uses paths relative to projectDir
# (frontend); ``../`` there reaches back up to the repo root.
afterPack: ./frontend/scripts/electron-builder-after-pack.cjs
asar: true
compression: maximum
asarUnpack:
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
directories:
  output: ../dist
  buildResources: build
files:
  - "!**/*"
  - dist-electron/**/*
  - package.json
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
  - "node_modules/pngjs/**/*"
# CPU flavor: bundles the lightweight stt-server (onnxruntime CPU-only).
# Built by ``pwsh server/packaging/build.ps1 -Flavor cpu`` → outputs
# <repo>/packaging/stt-server-dist/cpu/.
#
# Renderer (Vite static SPA) lives at dist-renderer/; main.ts resolves
# windows via loadRendererPage() in renderer-url.ts.
extraResources:
  - from: ../packaging/stt-server-dist/cpu/
    to: stt-server
    filter:
      - "**/*"
  - from: dist-renderer/
    to: renderer
    filter:
      - "**/*"
  - from: electron/native/bin/
    to: native/bin
    filter:
      - "winstt-paste.exe"
      - "winstt-context.exe"
  # State-driven, theme-aware tray icons (see electron-builder.yml comment).
  - from: electron/resources/tray/
    to: tray
    filter:
      - "**/*.png"
  # End-user license + third-party notices. Read at runtime by the
  # About tab in Settings (see notices-resources.ts in electron/lib/).
  - from: ../LICENSE
    to: LICENSE
  - from: ../THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  # Minisign verification pubkey. Bundled so the auto-updater can verify
  # the .minisig sidecar of any downloaded artifact at install time
  # (parallel offline-verifiable trust layer alongside Authenticode).
  # Missing on builds cut before the maintainer has generated the
  # keypair — the auto-updater hook fails-open with a warning.
  - from: ../docs/winstt.pub
    to: winstt.pub
    filter:
      - "winstt.pub"
win:
  target:
    - portable
  icon: build/icon.ico
  # Single-file portable .exe — no installer. Users double-click to run the
  # app directly; settings/cache live under %LOCALAPPDATA% as usual.
  artifactName: ${productName}-CPU-Portable-${version}.${ext}
# macOS-only resources. The Swift Apple Intelligence CLI is built via
# `bash tools/apple-intelligence-cli/build.sh` (Darwin-only; the script
# no-ops on Windows/Linux) and lands at
# frontend/electron/resources/macos/winstt-apple-llm.
# electron-builder copies it to <App>.app/Contents/Resources/macos/
# where electron/ipc/apple-intelligence.ts resolves it via
# process.resourcesPath. Gated on the `mac` target so Windows CI builds
# don't choke on a missing binary.
mac:
  category: public.app-category.utilities
  # Ship both DMG (drag-to-Applications, what most users expect) and ZIP
  # (electron-updater's macOS delta format). Only built when the runner
  # is macOS — the Windows CI matrix never trips this section.
  target:
    - target: dmg
      arch:
        - arm64
        - x64
    - target: zip
      arch:
        - arm64
        - x64
  icon: build/icon.icns
  hardenedRuntime: true
  gatekeeperAssess: false
  # Notarization is opt-in via env vars on the macOS runner. Set in
  # .github/workflows/electron-release.yml when the maintainer wires up
  # APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID secrets.
  # Without them, electron-builder still ships an ad-hoc-signed DMG that
  # macOS Gatekeeper will refuse on first launch — see BUILD.md for the
  # right-click → Open workaround until notarization is in place.
  entitlements: ../../tools/apple-intelligence-cli/Entitlements.plist
  entitlementsInherit: ../../tools/apple-intelligence-cli/Entitlements.plist
  extendInfo:
    NSMicrophoneUsageDescription: "WinSTT needs microphone access to transcribe your speech locally on this Mac."
    NSAppleEventsUsageDescription: "WinSTT uses Apple Events to deliver dictated text to the focused application."
    LSUIElement: false
  extraResources:
    - from: electron/resources/macos/
      to: macos
      filter:
        - "winstt-apple-llm"
dmg:
  # Reverse-DNS notarization-friendly name; the user-facing label stays
  # `productName` from above (WinSTT).
  artifactName: ${productName}-CPU-${version}-${arch}.${ext}
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
portable:
  artifactName: ${productName}-CPU-Portable-${version}.${ext}
  # Stable extraction folder under %LOCALAPPDATA% — see electron-builder.gpu.yml
  # for the rationale (avoid re-extracting the payload on every launch).
  unpackDirName: WinSTT-CPU
  requestExecutionLevel: user
  # Splash bitmap shown during first-run extract — see .gpu.yml for the
  # full explanation of why this is the only built-in option.
  splashImage: build/splash.bmp
  # PORTABLE-DATA MODE (in addition to portable self-extract delivery):
  # the app also supports keeping user state (settings, models,
  # recordings, logs, HF cache) self-contained next to the EXTRACTED
  # executable instead of %APPDATA%. Activation: a file literally
  # named ``portable`` next to ``WinSTT.exe`` (inside the unpacked
  # dir). An empty marker + sibling ``Data/`` dir works (the boot
  # upgrades it in place), or content ``WinSTT Portable Mode``
  # enables it unconditionally. See electron/portable-boot.ts and
  # electron/lib/portable.ts.
publish:
  - provider: github
    # Repo is inferred from the workflow context (dahshury/WinSTT) — no
    # explicit owner/repo override needed. CPU and GPU flavors upload to
    # the same per-tag release; their distinct `artifactName` keeps the
    # `.exe` filenames from colliding.
    #
    # Prereleases (e.g. v0.1.0-alpha.0) ship as GitHub prereleases.
    # electron-updater consumes them when the runtime sets
    # `autoUpdater.allowPrerelease = true` (see main.ts).
    releaseType: prerelease

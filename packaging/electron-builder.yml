appId: com.winstt.app
productName: WinSTT
# afterPack hook trims unused Chromium locale .pak files (saves ~30 MB).
# All relative paths resolve against projectDir = frontend (set via the
# `--projectDir frontend` CLI flag); `../` reaches back up to repo root.
afterPack: ./scripts/electron-builder-after-pack.cjs
asar: true
compression: maximum
asarUnpack:
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
directories:
  output: ../dist
  buildResources: build
files:
  - "!**/*"
  - dist-electron/**/*
  - package.json
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
  - "node_modules/pngjs/**/*"
# Bundled STT server (PyInstaller-frozen executable). This unflavored
# config is a manual-placement fallback for ``bun run electron:build`` —
# drop a bundle at <repo>/packaging/stt-server-dist/default/ or override
# the path here. Day-to-day builds should use electron-builder.{cpu,gpu}.yml
# which read packaging/stt-server-dist/{cpu,gpu}/ produced by
# ``pwsh server/packaging/build.ps1 -Flavor {cpu|gpu}``.
#
# Renderer is a Vite static SPA at dist-renderer/; main.ts resolves windows
# via loadRendererPage() in electron/lib/renderer-url.ts.
extraResources:
  - from: ../packaging/stt-server-dist/default/
    to: stt-server
    filter:
      - "**/*"
  - from: dist-renderer/
    to: renderer
    filter:
      - "**/*"
  # Native paste helper. Built by `bun run native:build` (which compiles
  # electron/native/src/winstt-paste.c). The Electron main process resolves
  # process.resourcesPath/native/bin/winstt-paste.exe when packaged.
  - from: electron/native/bin/
    to: native/bin
    filter:
      - "winstt-paste.exe"
      - "winstt-context.exe"
  # State-driven, theme-aware tray icons (9 PNGs × 2 DPIs). Generated by
  # `bun run icon:tray:generate` from frontend/scripts/generate-tray-icons.ts.
  # The runtime resolver in electron/ipc/tray-state.ts reads
  # `process.resourcesPath/tray/<file>` in packaged builds.
  - from: electron/resources/tray/
    to: tray
    filter:
      - "**/*.png"
  # End-user license + third-party notices. Read at runtime by the
  # About tab in Settings (see notices-resources.ts in electron/lib/).
  - from: ../LICENSE
    to: LICENSE
  - from: ../THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
win:
  target:
    - portable
  icon: build/icon.ico
  artifactName: ${productName}-Portable-${version}.${ext}
# macOS-only resources. The Swift Apple Intelligence CLI is compiled
# before electron-builder runs (see tools/apple-intelligence-cli/build.sh)
# and lands at frontend/electron/resources/macos/winstt-apple-llm.
# electron-builder copies it to <App>.app/Contents/Resources/macos/
# where electron/ipc/apple-intelligence.ts resolves it via
# process.resourcesPath. The block is gated on `mac.extraResources` so it
# never tries to run on Windows builds where the file doesn't exist.
mac:
  extraResources:
    - from: electron/resources/macos/
      to: macos
      filter:
        - "winstt-apple-llm"
portable:
  artifactName: ${productName}-Portable-${version}.${ext}
  # Stable extraction folder under %LOCALAPPDATA% — see electron-builder.gpu.yml
  # for the rationale (avoid re-extracting the payload on every launch).
  unpackDirName: WinSTT
  requestExecutionLevel: user
  # Splash bitmap shown during first-run extract.
  splashImage: build/splash.bmp
publish:
  - provider: github
    # Repo is inferred from the workflow context (dahshury/WinSTT) — no
    # explicit owner/repo override needed since installer + asset releases
    # both live on the same public repo. electron-updater fetches them
    # anonymously at runtime; CI publishes them via the default
    # `secrets.GITHUB_TOKEN`.
    #
    # Prereleases (e.g. v0.1.0-alpha.0) ship as GitHub prereleases.
    # electron-updater consumes them when the runtime sets
    # `autoUpdater.allowPrerelease = true` (see main.ts).
    releaseType: prerelease

appId: com.winstt.app
productName: WinSTT
# afterPack hook trims Chromium locale .pak files for languages we don't
# ship (saves ~30 MB unpacked / ~10 MB compressed). The Vite renderer
# output (`dist-renderer/`) is shipped via `extraResources` below.
#
# All relative paths here are resolved against the projectDir passed on
# the CLI (`--projectDir frontend`), so e.g. `./scripts/...` lives at
# frontend/scripts/... and `extraResources.from` paths that start with
# `../` reach back up to the repo root.
afterPack: ./scripts/electron-builder-after-pack.cjs
asar: true
compression: maximum
asarUnpack:
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
directories:
  # ../dist puts the final .exe at <repo>/dist/ (sibling of the
  # packaging/ folder) instead of frontend/dist/.
  output: ../dist
  buildResources: build
files:
  - "!**/*"
  - dist-electron/**/*
  - package.json
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
  - "node_modules/pngjs/**/*"
# DirectML flavor: bundles the stt-server with onnxruntime-directml — works
# on AMD, Intel and NVIDIA GPUs via DirectX 12. Total artifact ~200 MB,
# ~10x smaller than the CUDA flavor because we don't ship the NVIDIA pip
# wheel chain. This is now the DEFAULT WinSTT GPU download.
#
# Steady-state Whisper-tiny q4 latency on RTX 3080 Ti (idle, N=20, 5
# warmup): DirectML p50=85 ms / p95=89 ms / stdev=3 ms vs CUDA p50=120 ms
# / p95=151 ms / stdev=37 ms. DirectML wins on consistency AND median,
# while being lighter and vendor-agnostic.
#
# Built by ``pwsh server/packaging/build.ps1 -Flavor directml`` → outputs
# <repo>/packaging/stt-server-dist/directml/. The runtime in
# ``server/src/recorder/infrastructure/device.py`` (``resolve_accelerator``)
# auto-picks DirectML on Windows when its EP is registered.
#
# Renderer (Vite static SPA) lives at dist-renderer/index.html + per-window
# HTML siblings; main.ts resolves them via loadRendererPage() in renderer-url.ts.
extraResources:
  - from: ../packaging/stt-server-dist/directml/
    to: stt-server
    filter:
      - "**/*"
  - from: dist-renderer/
    to: renderer
    filter:
      - "**/*"
  - from: electron/native/bin/
    to: native/bin
    filter:
      - "winstt-paste.exe"
      - "winstt-context.exe"
  # End-user license + third-party notices. Read at runtime by the
  # About tab in Settings (see notices-resources.ts in electron/lib/).
  - from: ../LICENSE
    to: LICENSE
  - from: ../THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
win:
  target:
    - portable
  icon: build/icon.ico
  artifactName: ${productName}-Portable-${version}.${ext}
portable:
  artifactName: ${productName}-Portable-${version}.${ext}
  # Stable extraction folder under %LOCALAPPDATA% — same rationale as
  # electron-builder.gpu.yml (avoid re-extracting the payload on every
  # launch). DirectML is ~200 MB so the cost is lower than the CUDA
  # flavor, but still material — every launch would otherwise re-7z to
  # a fresh %TEMP% dir before the window appears.
  unpackDirName: WinSTT
  requestExecutionLevel: user
  # Splash bitmap shown during first-run extract — see .gpu.yml for the
  # full explanation of why this is the only built-in option.
  splashImage: build/splash.bmp
publish:
  - provider: github
    # Repo is inferred from the workflow context (dahshury/WinSTT) — no
    # explicit owner/repo override needed. CPU, DirectML and CUDA flavors
    # upload to the same per-tag release; their distinct `artifactName`
    # keeps the `.exe` filenames from colliding. The DirectML build is
    # the unmarked default — users click "Download WinSTT" and get it;
    # CPU and CUDA variants carry an explicit suffix.
    #
    # Prereleases (e.g. v0.1.0-alpha.0) ship as GitHub prereleases.
    # electron-updater consumes them when the runtime sets
    # `autoUpdater.allowPrerelease = true` (see main.ts).
    releaseType: prerelease

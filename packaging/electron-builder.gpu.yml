appId: com.winstt.app
productName: WinSTT
# afterPack hook trims Chromium locale .pak files for languages we don't
# ship (saves ~30 MB unpacked / ~10 MB compressed). The Vite renderer
# output (`dist-renderer/`) is shipped via `extraResources` below.
#
# All relative paths here are resolved against the projectDir passed on
# the CLI (`--projectDir frontend`), so e.g. `./scripts/...` lives at
# frontend/scripts/... and `extraResources.from` paths that start with
# `../` reach back up to the repo root.
afterPack: ./scripts/electron-builder-after-pack.cjs
asar: true
# Maximum 7z compression on the portable payload. The default ``normal``
# is already 7z but with light settings; ``maximum`` shaves another
# ~5–10 % off the .exe at the cost of a slower BUILD (extract speed at
# user end is unaffected). Worth it for a 1.7 GB artifact.
compression: maximum
asarUnpack:
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
directories:
  # ../dist puts the final .exe at <repo>/dist/ (sibling of the
  # packaging/ folder) instead of frontend/dist/.
  output: ../dist
  buildResources: build
files:
  - "!**/*"
  - dist-electron/**/*
  - package.json
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
  - "node_modules/pngjs/**/*"
# GPU flavor: bundles the larger stt-server with onnxruntime-gpu + 8 NVIDIA
# CUDA wheels (~2 GB). Falls back to CPU at runtime if the user's GPU /
# driver isn't viable (see server/src/recorder/infrastructure/device.py
# ``_probe_cuda_session``). Built by ``pwsh server/packaging/build.ps1
# -Flavor gpu`` → outputs <repo>/packaging/stt-server-dist/gpu/.
#
# Renderer (Vite static SPA) lives at dist-renderer/index.html + per-window
# HTML siblings; main.ts resolves them via loadRendererPage() in renderer-url.ts.
extraResources:
  - from: ../packaging/stt-server-dist/gpu/
    to: stt-server
    filter:
      - "**/*"
  - from: dist-renderer/
    to: renderer
    filter:
      - "**/*"
  - from: electron/native/bin/
    to: native/bin
    filter:
      - "winstt-paste.exe"
      - "winstt-context.exe"
  # State-driven, theme-aware tray icons (see electron-builder.yml comment).
  - from: electron/resources/tray/
    to: tray
    filter:
      - "**/*.png"
  # End-user license + third-party notices. Read at runtime by the
  # About tab in Settings (see notices-resources.ts in electron/lib/).
  - from: ../LICENSE
    to: LICENSE
  - from: ../THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
win:
  target:
    - portable
  icon: build/icon.ico
  artifactName: ${productName}-GPU-Portable-${version}.${ext}
# macOS-only resources. The Swift Apple Intelligence CLI lands at
# frontend/electron/resources/macos/winstt-apple-llm (built by
# `bash tools/apple-intelligence-cli/build.sh` on Darwin only). The GPU
# flavor is technically Windows-only today, but keeping the `mac` block
# here means a future cross-flavor macOS build will pick it up
# automatically.
mac:
  extraResources:
    - from: electron/resources/macos/
      to: macos
      filter:
        - "winstt-apple-llm"
portable:
  artifactName: ${productName}-GPU-Portable-${version}.${ext}
  # Extract once to a stable folder under %LOCALAPPDATA% on first launch.
  # Without this, the portable .exe re-extracts the entire ~2 GB payload
  # to a fresh randomized %TEMP% folder on every launch — a multi-second
  # silent delay with no progress UI before the window appears. With a
  # stable unpack dir, the very first run pays that cost once and every
  # subsequent launch is effectively instant.
  unpackDirName: WinSTT-GPU
  # Per-machine extraction speeds up first run by writing to LocalAppData
  # (per-user, no UAC) instead of the runtime-default temp path.
  requestExecutionLevel: user
  # Splash bitmap shown by the embedded 7z stub while the first-run extract
  # is in progress. electron-builder's portable target does NOT expose a
  # progress callback — there is no way to render a percentage bar on top
  # of the 7z self-extract — so the splash image is the only built-in way
  # to tell the user "the app is extracting, please wait" instead of
  # leaving them in front of an unresponsive launcher icon for ~10–30 s
  # on first launch. Generated by scripts/generate-splash-bmp.cjs.
  splashImage: build/splash.bmp
  # PORTABLE-DATA MODE (in addition to portable self-extract delivery):
  # the app also supports keeping user state (settings, models,
  # recordings, logs, HF cache) self-contained next to the EXTRACTED
  # executable instead of %APPDATA%. Activation: a file literally
  # named ``portable`` next to ``WinSTT.exe`` (inside the unpacked dir,
  # i.e. %LOCALAPPDATA%/WinSTT-GPU/). Empty marker + sibling ``Data/``
  # dir works (the bootstrap upgrades it in place), or content
  # ``WinSTT Portable Mode`` enables it unconditionally on first run.
  # See electron/portable-boot.ts and electron/lib/portable.ts.
publish:
  - provider: github
    # Repo is inferred from the workflow context (dahshury/WinSTT) — no
    # explicit owner/repo override needed. CPU and GPU flavors upload to
    # the same per-tag release; their distinct `artifactName` keeps the
    # `.exe` filenames from colliding.
    #
    # Prereleases (e.g. v0.1.0-alpha.0) ship as GitHub prereleases.
    # electron-updater consumes them when the runtime sets
    # `autoUpdater.allowPrerelease = true` (see main.ts).
    releaseType: prerelease

appId: com.winstt.app
productName: WinSTT
# afterPack hook trims Chromium locale .pak files for languages we don't
# ship (saves ~30 MB unpacked / ~10 MB compressed). The Vite renderer
# output (`dist-renderer/`) is shipped via `extraResources` below.
#
# All relative paths here are resolved against the projectDir passed on
# the CLI (`--projectDir frontend`), so e.g. `./scripts/...` lives at
# frontend/scripts/... and `extraResources.from` paths that start with
# `../` reach back up to the repo root.
# afterPack is resolved from the repo root (electron-builder's launch CWD),
# not from projectDir like extraResources.from is — so the path here must
# reach into frontend/ explicitly.
afterPack: ./frontend/scripts/electron-builder-after-pack.cjs
asar: true
compression: maximum
asarUnpack:
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
directories:
  # ../dist puts the final .exe at <repo>/dist/ (sibling of the
  # packaging/ folder) instead of frontend/dist/.
  output: ../dist
  buildResources: build
files:
  - "!**/*"
  - dist-electron/**/*
  - package.json
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
  - "node_modules/pngjs/**/*"
# OpenVINO flavor: bundles the stt-server with onnxruntime-openvino — the
# Intel-optimised ORT distribution. Targets Intel ARC dGPUs, Iris Xe /
# Arc iGPUs, and the Intel-vectorized CPU path. ~10-30 % steady-state
# uplift over DirectML on Intel silicon (per Intel-published benchmarks);
# DirectML's generic D3D12 path is still used on AMD/NVIDIA GPUs.
#
# Built by ``pwsh server/packaging/build.ps1 -Flavor openvino`` → outputs
# <repo>/packaging/stt-server-dist/openvino/. The runtime in
# ``server/src/recorder/infrastructure/device.py`` (``resolve_accelerator``)
# auto-picks OpenVINO when its EP is registered and the host has an
# Intel accelerator; falls back to CPU otherwise.
#
# Override the OpenVINO device target via the OPENVINO_DEVICE env var
# (AUTO / GPU / GPU.0 / CPU; default AUTO).
#
# Renderer (Vite static SPA) lives at dist-renderer/index.html + per-window
# HTML siblings; main.ts resolves them via loadRendererPage() in renderer-url.ts.
extraResources:
  - from: ../packaging/stt-server-dist/openvino/
    to: stt-server
    filter:
      - "**/*"
  - from: dist-renderer/
    to: renderer
    filter:
      - "**/*"
  - from: electron/native/bin/
    to: native/bin
    filter:
      - "winstt-paste.exe"
      - "winstt-context.exe"
  # State-driven, theme-aware tray icons (see electron-builder.yml comment).
  - from: electron/resources/tray/
    to: tray
    filter:
      - "**/*"
  # End-user license + third-party notices. Read at runtime by the
  # About tab in Settings (see notices-resources.ts in electron/lib/).
  - from: ../LICENSE
    to: LICENSE
  - from: ../THIRD_PARTY_NOTICES.md
    to: THIRD_PARTY_NOTICES.md
  # Minisign verification pubkey. Bundled so the auto-updater can verify
  # the .minisig sidecar at install time (parallel offline-verifiable
  # trust layer alongside Authenticode). Missing on builds cut before
  # the maintainer has generated the keypair — the auto-updater hook
  # fails-open with a warning.
  - from: ../docs/winstt.pub
    to: winstt.pub
    filter:
      - "winstt.pub"
win:
  target:
    - portable
  icon: build/icon.ico
  # Distinct artifactName so the OpenVINO flavor doesn't collide with the
  # DirectML default (`WinSTT-Portable-<v>.exe`) or the CPU flavor
  # (`WinSTT-CPU-Portable-<v>.exe`) when both upload to the same release.
  artifactName: ${productName}-OpenVINO-Portable-${version}.${ext}
portable:
  artifactName: ${productName}-OpenVINO-Portable-${version}.${ext}
  # Distinct extraction folder so DirectML / OpenVINO portable installs
  # don't share the same %LOCALAPPDATA% staging dir (which would let the
  # last-extracted payload overwrite the other's stt-server.exe).
  unpackDirName: WinSTT-OpenVINO
  requestExecutionLevel: user
  splashImage: build/splash.bmp
publish:
  - provider: github
    # All flavors (CPU, DirectML, OpenVINO, optional CUDA) upload to the
    # same per-tag release; their distinct `artifactName` keeps the `.exe`
    # filenames from colliding. The DirectML build remains the unmarked
    # default — users click "Download WinSTT" and get it; CPU / OpenVINO
    # / CUDA variants carry an explicit suffix.
    releaseType: prerelease

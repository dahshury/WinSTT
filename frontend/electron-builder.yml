appId: com.winstt.app
productName: WinSTT
asar: true
asarUnpack:
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
  - "out/standalone/**/*"
directories:
  output: dist
  buildResources: build
files:
  - "!**/*"
  - dist-electron/**/*
  # Only the Next.js standalone server tree is needed at runtime. The wider
  # `out/**/*` glob used to bundle Next's dev cache (out/dev/, up to 1.5 GB)
  # and intermediate build artefacts (out/server/, out/build/, etc.) into
  # the asar — `prepare-next-standalone` already copies `out/static` and
  # `public/` inside `out/standalone/`, so nothing else from `out/` is needed.
  - out/standalone/**/*
  - package.json
  - "node_modules/uiohook-napi/**/*"
  - "node_modules/node-gyp-build/**/*"
  - "node_modules/pngjs/**/*"
# Bundled STT server (PyInstaller/Nuitka executable).
# Place the built server at frontend/stt-server-dist/ before running electron:build.
# In production, stt-process.ts resolves to process.resourcesPath/stt-server/
extraResources:
  - from: stt-server-dist/
    to: stt-server
    filter:
      - "**/*"
  # Native paste helper. Built by `bun run native:build` (which compiles
  # electron/native/src/winstt-paste.c). The Electron main process resolves
  # process.resourcesPath/native/bin/winstt-paste.exe when packaged.
  - from: electron/native/bin/
    to: native/bin
    filter:
      - "winstt-paste.exe"
      - "winstt-context.exe"
win:
  target:
    - nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
publish:
  - provider: github
    releaseType: release
